category: 网络工具/扩展工具
description: 网络抓包、代理、扫描、探测等扩展工具
commands:
- name: tshark
  category: 网络工具/扩展工具
  install_required: true
  description: Wireshark 命令行抓包工具
  usage:
  - tshark [OPTIONS] [ARGS]
  options:
  - flag: -i
    description: 指定网卡
  - flag: -w
    description: 写入 pcap 文件
  - flag: -f
    description: 设置捕获过滤器
  - flag: -r
    description: 读取 pcap
  examples:
  - command: sudo tshark -i eth0 -w capture.pcap
    description: 在 eth0 抓包并保存
  - command: tshark -r capture.pcap -Y http
    description: 读取并过滤 HTTP 包
  platforms:
  - linux
  - darwin
  related_commands:
  - tcpdump
  - wireshark
  install_method: 包管理器安装，如 sudo apt install tshark
  risks:
  - level: high
    description: 抓包会捕获敏感流量，请遵守数据隐私与合规要求
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: termshark
  category: 网络工具/扩展工具
  install_required: true
  description: 终端交互式 TUI 抓包工具
  usage:
  - termshark [OPTIONS] [ARGS]
  options:
  - flag: -i
    description: 指定网卡
  - flag: -r
    description: 读取 pcap
  - flag: -f
    description: 捕获过滤器
  examples:
  - command: sudo termshark -i eth0
    description: 终端交互式抓包
  - command: termshark -r capture.pcap
    description: 交互式查看 pcap
  platforms:
  - linux
  - darwin
  related_commands:
  - tshark
  - tcpdump
  install_method: pip install termshark 或参考 https://github.com/gcla/termshark
  risks:
  - level: high
    description: 查看网络流量可能涉及敏感信息，请确保授权
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: tcpflow
  category: 网络工具/扩展工具
  install_required: true
  description: TCP 流重组与捕获工具
  usage:
  - tcpflow [OPTIONS] [ARGS]
  options:
  - flag: -i
    description: 指定网卡
  - flag: -o
    description: 输出目录
  - flag: -c
    description: 输出到控制台
  examples:
  - command: sudo tcpflow -i eth0 port 80
    description: 捕获 eth0 上 80 端口的 TCP 流
  - command: tcpflow -r capture.pcap
    description: 从 pcap 重组流
  platforms:
  - linux
  - darwin
  related_commands:
  - tcpdump
  - tshark
  install_method: 包管理器安装，如 sudo apt install tcpflow
  risks:
  - level: high
    description: 重组流会还原明文数据，请遵守隐私政策
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: ngrep
  category: 网络工具/扩展工具
  install_required: true
  description: 网络数据包内容过滤工具
  usage:
  - ngrep [OPTIONS] [ARGS]
  options:
  - flag: -i
    description: 忽略大小写
  - flag: -W
    description: byline
  - flag: -q
    description: 静默
  - flag: -d
    description: 指定网卡
  examples:
  - command: sudo ngrep -d eth0 'GET' 'tcp port 80'
    description: 过滤 80 端口的 GET 请求
  - command: sudo ngrep -q 'password' 'port 3306'
    description: 查找含 password 的流量
  platforms:
  - linux
  - darwin
  related_commands:
  - tcpdump
  - grep
  install_method: 包管理器安装，如 sudo apt install ngrep
  risks:
  - level: high
    description: 匹配敏感关键词会泄露数据，请仅在授权环境使用
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: socat
  category: 网络工具/扩展工具
  install_required: true
  description: 双向数据转发工具，号称 netcat 增强版
  usage:
  - socat [OPTIONS] [ARGS]
  options:
  - flag: -u
    description: 单向模式
  - flag: -d
    description: 增加调试级别
  - flag: TCP-LISTEN
    description: ''
  - flag: TCP
    description: ''
  examples:
  - command: socat TCP-LISTEN:8080,fork TCP:192.168.1.10:80
    description: 将本地 8080 转发到远程 80
  - command: socat - UNIX-CONNECT:/var/run/docker.sock
    description: 通过 socat 连接 Docker socket
  platforms:
  - linux
  - darwin
  related_commands:
  - nc
  - ssh -L
  install_method: 包管理器安装，如 sudo apt install socat
  risks:
  - level: medium
    description: 端口转发会暴露内部服务，请确认访问控制和防火墙
- name: telnet
  category: 网络工具/扩展工具
  install_required: true
  description: 基于文本的远程登录/端口探测工具
  usage:
  - telnet [OPTIONS] [ARGS]
  options:
  - flag: '-4'
    description: 只使用 IPv4
  - flag: '-6'
    description: 只使用 IPv6
  - flag: port
    description: 指定端口
  examples:
  - command: telnet localhost 25
    description: 测试本地 25 端口
  - command: telnet example.com 80
    description: 探测远程 80 端口
  platforms:
  - linux
  - darwin
  related_commands:
  - nc
  - ssh
  install_method: 多数系统预装或包管理器安装
  risks:
  - level: medium
    description: telnet 明文传输，不建议用于生产认证，优先使用 ssh
- name: proxychains
  category: 网络工具/扩展工具
  install_required: true
  description: 强制任意程序通过代理连接网络
  usage:
  - proxychains [OPTIONS] [ARGS]
  options:
  - flag: -q
    description: 静默模式
  - flag: -f
    description: 指定配置文件
  examples:
  - command: proxychains curl https://example.com
    description: 通过代理访问目标
  - command: proxychains -q nmap -sT target
    description: 通过代理进行 TCP 扫描
  platforms:
  - linux
  - darwin
  related_commands:
  - nc
  - sshuttle
  install_method: 包管理器安装，如 sudo apt install proxychains4
  risks:
  - level: medium
    description: 代理配置错误会导致流量绕行或泄露，请确认代理安全
- name: amass
  category: 网络工具/扩展工具
  install_required: true
  description: 深度子域名枚举与资产发现
  usage:
  - amass [OPTIONS] [ARGS]
  options:
  - flag: enum
    description: 枚举
  - flag: -d
    description: 目标域名
  - flag: -o
    description: 输出文件
  - flag: -active
    description: 主动模式
  examples:
  - command: amass enum -d example.com
    description: 枚举 example.com 子域名
  - command: amass enum -d example.com -o subs.txt
    description: 保存结果
  platforms:
  - linux
  - darwin
  related_commands:
  - subfinder
  - httpx
  install_method: 参考 https://github.com/owasp-amass/amass/releases
  risks:
  - level: medium
    description: 主动枚举可能触发目标告警，请仅对授权域名执行
- name: dnsrecon
  category: 网络工具/扩展工具
  install_required: true
  description: DNS 枚举与区域传送检测
  usage:
  - dnsrecon [OPTIONS] [ARGS]
  options:
  - flag: -d
    description: 目标域名
  - flag: -t
    description: 枚举类型
  - flag: -D
    description: 字典文件
  examples:
  - command: dnsrecon -d example.com
    description: 枚举 DNS 记录
  - command: dnsrecon -d example.com -t axfr
    description: 检测区域传送漏洞
  platforms:
  - linux
  - darwin
  related_commands:
  - dig
  - amass
  install_method: 参考 https://github.com/darkoperator/dnsrecon
  risks:
  - level: medium
    description: 大量 DNS 查询可能被目标视为扫描，请控制速率
- name: dog
  category: 网络工具/扩展工具
  install_required: true
  description: 友好的命令行 DNS 客户端
  usage:
  - dog [OPTIONS] [ARGS]
  options:
  - flag: -t
    description: 指定记录类型
  - flag: -n
    description: 指定名称服务器
  - flag: --json
    description: JSON 输出
  examples:
  - command: dog example.com
    description: 查询 A 记录
  - command: dog example.com MX -n 8.8.8.8
    description: 使用指定 DNS 查询 MX
  platforms:
  - linux
  - darwin
  related_commands:
  - dig
  - host
  install_method: 参考 https://github.com/ogham/dog/releases
  risks:
  - level: low
    description: 命令风险较低，执行前请阅读文档并确认参数。
- name: hping3
  category: 网络工具/扩展工具
  install_required: true
  description: 自定义 TCP/IP 数据包生成与探测工具
  usage:
  - hping3 [OPTIONS] [ARGS]
  options:
  - flag: -S
    description: SYN 扫描
  - flag: -p
    description: 目标端口
  - flag: -c
    description: 发送次数
  - flag: --flood
    description: 泛洪模式
  examples:
  - command: sudo hping3 -S -p 80 -c 4 example.com
    description: 发送 SYN 探测 80 端口
  - command: sudo hping3 --flood -p 80 example.com
    description: 泛洪测试（谨慎）
  platforms:
  - linux
  - darwin
  related_commands:
  - nmap
  - nping
  install_method: 包管理器安装，如 sudo apt install hping3
  risks:
  - level: critical
    description: 泛洪模式会制造拒绝服务，严禁对未授权目标使用
  - level: critical
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: locust
  category: 网络工具/扩展工具
  install_required: true
  description: Python 编写的可编程负载测试工具
  usage:
  - locust [OPTIONS] [ARGS]
  options:
  - flag: -f
    description: 指定 locustfile
  - flag: --host
    description: 目标主机
  - flag: -u
    description: 用户数
  - flag: -r
    description: 每秒启动数
  examples:
  - command: locust -f locustfile.py --host https://example.com
    description: 启动 Locust Web 界面
  - command: locust -f locustfile.py -u 100 -r 10 --run-time 60s --headless
    description: 无头模式运行 60 秒
  platforms:
  - linux
  - darwin
  related_commands:
  - k6
  - wrk
  install_method: pip install locust
  risks:
  - level: high
    description: Locust 压测会消耗目标资源，请获得授权并配置限流
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: artillery
  category: 网络工具/扩展工具
  install_required: true
  description: 现代 Node.js 负载测试与 SRE 工具
  usage:
  - artillery [OPTIONS] [ARGS]
  options:
  - flag: run
    description: 运行测试
  - flag: quick
    description: 快速压测
  - flag: -o
    description: 输出报告
  examples:
  - command: artillery quick --count 10 --num 50 https://example.com
    description: 快速压测
  - command: artillery run load-test.yml
    description: 运行 YAML 压测脚本
  platforms:
  - linux
  - darwin
  related_commands:
  - k6
  - locust
  install_method: npm install -g artillery
  risks:
  - level: high
    description: 压测可能影响生产服务，请在授权沙箱或测试环境执行
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: fortio
  category: 网络工具/扩展工具
  install_required: true
  description: Istio 配套的负载测试与 echo 服务器
  usage:
  - fortio [OPTIONS] [ARGS]
  options:
  - flag: load
    description: 压测
  - flag: server
    description: 启动 echo 服务器
  - flag: -qps
    description: 每秒查询数
  - flag: -t
    description: 持续时间
  examples:
  - command: fortio load -qps 100 -t 30s https://example.com
    description: 以 100 QPS 压测 30 秒
  - command: fortio server
    description: 启动 echo 服务器
  platforms:
  - linux
  - darwin
  related_commands:
  - k6
  - wrk
  install_method: 参考 https://github.com/fortio/fortio/releases
  risks:
  - level: high
    description: 高 QPS 压测会消耗目标资源，请获得授权
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: iftop
  category: 网络工具/扩展工具
  install_required: true
  description: 实时显示网络接口带宽使用
  usage:
  - iftop [OPTIONS] [ARGS]
  options:
  - flag: -i
    description: 指定网卡
  - flag: -n
    description: 禁用 DNS
  - flag: -B
    description: 以字节显示
  examples:
  - command: sudo iftop -i eth0
    description: 查看 eth0 实时流量
  - command: sudo iftop -nB -i eth0
    description: 以字节显示且不做 DNS 解析
  platforms:
  - linux
  - darwin
  related_commands:
  - nethogs
  - bmon
  install_method: 包管理器安装，如 sudo apt install iftop
  risks:
  - level: low
    description: 只读/信息查询类命令，风险较低，但仍需确认目标对象。
