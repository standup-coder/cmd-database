category: 操作系统/通用Linux命令
description: 各Linux发行版通用的基础命令
updated_at: 2025-12-14 00:00:00+00:00
commands:
- name: ls
  category: 操作系统/通用Linux命令
  install_required: false
  description: 列出目录内容
  usage:
  - ls [选项] [文件或目录]
  options:
  - flag: -l
    description: 使用长格式列表
  - flag: -a
    description: 显示所有文件（包括隐藏文件）
  - flag: -h
    description: 以人类可读的格式显示文件大小
  - flag: -R
    description: 递归列出子目录
  - flag: -t
    description: 按修改时间排序
  - flag: -r
    description: 反向排序
  examples:
  - command: ls -la
    description: 以长格式列出所有文件，包括隐藏文件
  - command: ls -lh /var/log
    description: 以人类可读格式列出/var/log目录
  - command: ls -ltr
    description: 按时间反向排序列出文件
  notes:
  - 默认不显示以.开头的隐藏文件
  - 颜色输出取决于LS_COLORS环境变量
  platforms:
  - linux
  - darwin
  - unix
  references:
  - https://man7.org/linux/man-pages/man1/ls.1.html
- name: grep
  category: 操作系统/通用Linux命令
  install_required: false
  description: 在文件中搜索文本模式
  usage:
  - grep [选项] 模式 [文件...]
  options:
  - flag: -i
    description: 忽略大小写
  - flag: -r, -R
    description: 递归搜索目录
  - flag: -n
    description: 显示行号
  - flag: -v
    description: 反向匹配（显示不匹配的行）
  - flag: -E
    description: 使用扩展正则表达式
  - flag: -w
    description: 匹配整个单词
  - flag: -c
    description: 只显示匹配的行数
  - flag: -l
    description: 只显示匹配的文件名
  examples:
  - command: grep 'error' /var/log/syslog
    description: 在系统日志中搜索包含error的行
  - command: grep -ri 'TODO' .
    description: 递归搜索当前目录下所有包含TODO的文件（忽略大小写）
  - command: grep -E '192\.168\.[0-9]+\.[0-9]+' access.log
    description: 使用正则表达式搜索IP地址
  notes:
  - 支持基本正则表达式和扩展正则表达式
  - 可以通过管道与其他命令组合使用
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - egrep
  - fgrep
  - awk
  - sed
  references:
  - https://www.gnu.org/software/grep/manual/
- name: find
  category: 操作系统/通用Linux命令
  install_required: false
  description: 在目录树中搜索文件
  usage:
  - find [路径...] [表达式]
  options:
  - flag: -name pattern
    description: 按文件名搜索
  - flag: -type [f|d|l]
    description: 按类型搜索（f:文件, d:目录, l:符号链接）
  - flag: -mtime n
    description: 按修改时间搜索（n天前）
  - flag: -size n
    description: 按文件大小搜索
  - flag: -exec command {} \;
    description: 对找到的文件执行命令
  - flag: -delete
    description: 删除找到的文件
  examples:
  - command: find . -name '*.log'
    description: 在当前目录下查找所有.log文件
  - command: find /tmp -type f -mtime +7 -delete
    description: 删除/tmp下7天前的文件
    output: 已删除的文件数量
  - command: find . -type f -size +100M
    description: 查找大于100MB的文件
  notes:
  - find命令功能强大但要小心使用-delete选项
  - 使用-exec时，{}代表找到的文件名
  risks:
  - level: high
    description: 使用-delete选项可能误删重要文件，建议先用-print预览
  - level: medium
    description: 在大目录树中搜索可能消耗大量系统资源
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - locate
  - which
  - whereis
  references:
  - https://man7.org/linux/man-pages/man1/find.1.html
- name: rm
  category: 操作系统/通用Linux命令
  install_required: false
  description: 删除文件或目录
  usage:
  - rm [选项] 文件或目录...
  options:
  - flag: -r, -R
    description: 递归删除目录及其内容
  - flag: -f
    description: 强制删除，忽略不存在的文件，不提示确认
  - flag: -i
    description: 删除前提示确认
  - flag: -v
    description: 显示详细信息
  examples:
  - command: rm file.txt
    description: 删除单个文件
  - command: rm -rf /tmp/test
    description: 强制递归删除目录
  - command: rm -i *.log
    description: 交互式删除所有.log文件
  notes:
  - 删除的文件无法恢复，使用前务必确认
  - 不要在根目录(/)使用rm -rf命令
  - 建议使用-i选项进行确认
  risks:
  - level: critical
    description: rm -rf可能导致数据永久丢失，使用前必须仔细确认路径
  - level: critical
    description: 绝对不要执行'rm -rf /'命令，会删除整个系统
  - level: high
    description: 使用通配符时要格外小心，可能匹配到不想删除的文件
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - rmdir
  - trash
  - mv
  references:
  - https://man7.org/linux/man-pages/man1/rm.1.html
- name: cat
  category: 操作系统/通用Linux命令
  install_required: false
  description: 连接文件并输出到标准输出
  usage:
  - cat [选项] [文件...]
  options:
  - flag: -n
    description: 对输出的所有行编号
  - flag: -b
    description: 对非空行编号
  - flag: -s
    description: 压缩连续的空行为一行
  - flag: -E
    description: 在每行末尾显示$符号
  - flag: -T
    description: 将TAB字符显示为^I
  examples:
  - command: cat file.txt
    description: 显示文件内容
  - command: cat file1.txt file2.txt > combined.txt
    description: 合并多个文件
  - command: cat -n script.sh
    description: 显示文件内容并添加行号
  notes:
  - 适合查看小文件，大文件建议使用less或more
  - '可以通过重定向创建文件: cat > file.txt'
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - less
  - more
  - head
  - tail
  references:
  - https://man7.org/linux/man-pages/man1/cat.1.html
- name: cd
  category: 操作系统/通用Linux命令
  install_required: false
  description: 切换当前工作目录
  usage:
  - cd [目录]
  options:
  - flag: '-'
    description: 切换到上一个工作目录
  - flag: '~'
    description: 切换到用户主目录
  examples:
  - command: cd /var/log
    description: 切换到/var/log目录
  - command: cd ~
    description: 切换到用户主目录
  - command: cd -
    description: 切换回上一个目录
  notes:
  - cd是shell内置命令
  - 不带参数时默认切换到主目录
  platforms:
  - linux
  - darwin
  - unix
- name: pwd
  category: 操作系统/通用Linux命令
  install_required: false
  description: 显示当前工作目录的完整路径
  usage:
  - pwd [选项]
  options:
  - flag: -L
    description: 显示逻辑路径（默认）
  - flag: -P
    description: 显示物理路径（解析符号链接）
  examples:
  - command: pwd
    description: 显示当前目录
    output: /home/user/documents
  platforms:
  - linux
  - darwin
  - unix
  references:
  - https://man7.org/linux/man-pages/man1/pwd.1.html
- name: cp
  category: 操作系统/通用Linux命令
  install_required: false
  description: 复制文件或目录
  usage:
  - cp [选项] 源文件 目标文件
  - cp [选项] 源文件... 目标目录
  options:
  - flag: -r, -R
    description: 递归复制目录
  - flag: -i
    description: 覆盖前提示确认
  - flag: -f
    description: 强制覆盖
  - flag: -p
    description: 保留文件属性
  - flag: -a
    description: 归档模式，等同于-dpR
  - flag: -v
    description: 显示详细信息
  examples:
  - command: cp file1.txt file2.txt
    description: 复制文件
  - command: cp -r dir1 dir2
    description: 递归复制目录
  - command: cp -a /source/* /backup/
    description: 归档复制，保留所有属性
  notes:
  - 复制目录必须使用-r选项
  - 默认不会覆盖只读文件
  risks:
  - level: medium
    description: 使用-f可能意外覆盖重要文件
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - mv
  - rsync
  references:
  - https://man7.org/linux/man-pages/man1/cp.1.html
- name: mv
  category: 操作系统/通用Linux命令
  install_required: false
  description: 移动或重命名文件和目录
  usage:
  - mv [选项] 源文件 目标文件
  - mv [选项] 源文件... 目标目录
  options:
  - flag: -i
    description: 覆盖前提示确认
  - flag: -f
    description: 强制覆盖
  - flag: -n
    description: 不覆盖已存在的文件
  - flag: -v
    description: 显示详细信息
  examples:
  - command: mv oldname.txt newname.txt
    description: 重命名文件
  - command: mv file.txt /tmp/
    description: 移动文件到/tmp目录
  - command: mv -i *.txt /backup/
    description: 交互式移动所有txt文件
  risks:
  - level: medium
    description: 移动文件会改变文件位置，可能导致依赖该路径的程序出错
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - cp
  - rename
  references:
  - https://man7.org/linux/man-pages/man1/mv.1.html
- name: awk
  category: 操作系统/通用Linux命令
  install_required: false
  description: 文本处理语言，按模式扫描和处理文件
  usage:
  - awk 'pattern { action }' [file...]
  options:
  - flag: -F
    description: 指定字段分隔符
  - flag: -v
    description: 赋值变量
  - flag: -f
    description: 从文件读取awk脚本
  examples:
  - command: awk '{print $1}' file.txt
    description: 打印每行第一个字段
  - command: 'awk -F: ''{print $1}'' /etc/passwd'
    description: 以冒号分隔打印第一个字段
  - command: awk '/pattern/ {print $0}' file.txt
    description: 匹配pattern的行
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - sed
  - grep
  - cut
- name: sed
  category: 操作系统/通用Linux命令
  install_required: false
  description: 流编辑器，执行基本的文本转换
  usage:
  - sed [选项] '命令' [文件...]
  options:
  - flag: -i
    description: 直接修改文件
  - flag: -e
    description: 执行多个命令
  - flag: -n
    description: 静默模式，只打印指定行
  - flag: -r
    description: 使用扩展正则表达式
  examples:
  - command: sed 's/old/new/g' file.txt
    description: 全局替换文本
  - command: sed -i 's/old/new/g' file.txt
    description: 直接修改文件内容
  - command: sed -n '5,10p' file.txt
    description: 打印第5到10行
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - awk
  - grep
  - tr
- name: kill
  category: 操作系统/通用Linux命令
  install_required: false
  description: 向进程发送信号以终止或控制
  usage:
  - kill [信号] PID...
  options:
  - flag: '-9'
    description: SIGKILL，强制终止（不可捕获）
  - flag: '-15'
    description: SIGTERM，优雅终止（默认）
  - flag: -l
    description: 列出所有信号名称
  examples:
  - command: kill 1234
    description: 优雅终止PID 1234
  - command: kill -9 1234
    description: 强制终止PID 1234
  - command: kill -l
    description: 列出所有可用信号
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - ps
  - top
  - killall
- name: which
  category: 操作系统/通用Linux命令
  install_required: false
  description: 查找命令的可执行文件路径
  usage:
  - which [选项] 命令...
  options:
  - flag: -a
    description: 显示所有匹配路径
  examples:
  - command: which python
    description: 查找python可执行文件位置
  - command: which -a python
    description: 查找所有python路径
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - whereis
  - type
  - command
- name: whereis
  category: 操作系统/通用Linux命令
  install_required: false
  description: 定位命令的二进制、源码和手册页文件
  usage:
  - whereis [选项] 命令...
  options:
  - flag: -b
    description: 只搜索二进制文件
  - flag: -m
    description: 只搜索手册页
  - flag: -s
    description: 只搜索源码
  examples:
  - command: whereis python
    description: 查找python的所有相关文件
  - command: whereis -b python
    description: 只查找python二进制文件
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - which
  - locate
  - find
- name: locate
  category: 操作系统/通用Linux命令
  install_required: true
  install_method: apt install mlocate (Ubuntu) 或 yum install mlocate (CentOS)
  description: 通过预建数据库快速查找文件
  usage:
  - locate [选项] 模式...
  options:
  - flag: -i
    description: 忽略大小写
  - flag: -r
    description: 使用正则表达式
  - flag: -c
    description: 只显示匹配数量
  - flag: -n <N>
    description: 最多显示N个结果
  examples:
  - command: locate nginx.conf
    description: 快速查找nginx配置文件
  - command: locate -i '*.log'
    description: 忽略大小写查找日志文件
  platforms:
  - linux
  - darwin
  related_commands:
  - find
  - whereis
  - updatedb
- name: less
  category: 操作系统/通用Linux命令
  install_required: false
  description: 分页查看文件内容，支持前后翻页
  usage:
  - less [选项] [文件...]
  options:
  - flag: -N
    description: 显示行号
  - flag: -i
    description: 搜索时忽略大小写
  - flag: -S
    description: 截断长行不换行
  - flag: +F
    description: 类似tail -f，实时跟踪文件
  examples:
  - command: less /var/log/syslog
    description: 分页查看系统日志
  - command: less +F /var/log/nginx/access.log
    description: 实时跟踪日志文件
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - more
  - cat
  - tail
- name: head
  category: 操作系统/通用Linux命令
  install_required: false
  description: 显示文件开头部分
  usage:
  - head [选项] [文件...]
  options:
  - flag: -n <N>
    description: 显示前N行（默认10行）
  - flag: -c <N>
    description: 显示前N字节
  - flag: -q
    description: 不显示文件名标题
  examples:
  - command: head -n 20 file.txt
    description: 显示文件前20行
  - command: head -c 100 file.bin
    description: 显示文件前100字节
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - tail
  - cat
  - less
- name: tail
  category: 操作系统/通用Linux命令
  install_required: false
  description: 显示文件末尾部分，支持实时跟踪
  usage:
  - tail [选项] [文件...]
  options:
  - flag: -n <N>
    description: 显示最后N行（默认10行）
  - flag: -f
    description: 实时跟踪文件追加内容
  - flag: -F
    description: 跟踪并处理日志轮转
  examples:
  - command: tail -f /var/log/syslog
    description: 实时跟踪系统日志
  - command: tail -n 50 file.txt
    description: 显示文件最后50行
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - head
  - less
  - watch
- name: rsync
  category: 操作系统/通用Linux命令
  install_required: true
  install_method: apt install rsync (Ubuntu) 或 yum install rsync (CentOS)
  description: 远程和本地文件同步工具，支持增量传输
  usage:
  - rsync [选项] 源 目标
  options:
  - flag: -a, --archive
    description: 归档模式，保留权限和属性
  - flag: -v, --verbose
    description: 显示详细输出
  - flag: -z, --compress
    description: 传输时压缩数据
  - flag: -P
    description: 显示进度并支持断点续传
  - flag: --delete
    description: 删除目标中源没有的文件
  - flag: -e ssh
    description: 使用SSH作为传输通道
  examples:
  - command: rsync -avz /local/dir/ user@remote:/remote/dir/
    description: 同步本地目录到远程
  - command: rsync -avz --delete /src/ /dest/
    description: 镜像同步，删除目标多余文件
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - scp
  - cp
  - sftp
- name: export
  category: 操作系统/通用Linux命令
  install_required: false
  description: 设置或显示环境变量
  usage:
  - export [选项] [名称[=值]...]
  options:
  - flag: -p
    description: 以可复用格式显示所有变量
  - flag: -n
    description: 从导出列表中移除变量
  examples:
  - command: export PATH=$PATH:/usr/local/bin
    description: 添加路径到PATH
  - command: export MY_VAR=value
    description: 设置环境变量
  - command: export -p
    description: 显示所有导出的变量
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - env
  - set
  - unset
- name: egrep
  category: 操作系统/通用Linux命令
  install_required: false
  description: 扩展正则表达式grep（等同于grep -E）
  usage:
  - egrep [选项] 模式 [文件...]
  options:
  - flag: -i
    description: 忽略大小写
  - flag: -v
    description: 反向匹配
  - flag: -n
    description: 显示行号
  examples:
  - command: egrep 'error|warning' log.txt
    description: 匹配error或warning
  - command: egrep -i '^[a-z]+@[a-z]+\.com' emails.txt
    description: 匹配邮箱格式
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - grep
  - fgrep
  - awk
- name: fgrep
  category: 操作系统/通用Linux命令
  install_required: false
  description: 固定字符串grep（等同于grep -F），禁用正则表达式
  usage:
  - fgrep [选项] 字符串 [文件...]
  options:
  - flag: -i
    description: 忽略大小写
  - flag: -x
    description: 整行匹配
  - flag: -f
    description: 从文件读取匹配模式
  examples:
  - command: fgrep 'a*b' file.txt
    description: 按字面匹配a*b（不解释正则）
  - command: fgrep -f patterns.txt log.txt
    description: 从文件读取多个匹配字符串
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - grep
  - egrep
  - awk
- name: more
  category: 操作系统/通用Linux命令
  install_required: false
  description: 分页查看文件内容（less的简化版）
  usage:
  - more [选项] [文件...]
  options:
  - flag: -N
    description: 显示行号
  - flag: +N
    description: 从第N行开始显示
  examples:
  - command: more file.txt
    description: 分页查看文件
  - command: cat file.txt | more
    description: 管道分页查看
  platforms:
  - linux
  - darwin
  - unix
  related_commands:
  - less
  - cat
  - head
- name: rename
  category: 操作系统/通用Linux命令
  install_required: false
  description: 批量重命名文件（Perl正则表达式版或util-linux版）
  usage:
