category: 数据库工具/运维操作
description: 数据库备份恢复、复制管理和性能调优
commands:
- name: redis-cli (advanced)
  category: 数据库工具/运维操作
  install_required: true
  install_method: 随 Redis 安装
  description: Redis 高级运维操作（集群、持久化、内存分析）
  usage:
  - redis-cli [选项] [命令]
  options:
  - flag: --bigkeys
    description: 扫描大 key
  - flag: --memkeys
    description: 按内存排序 key
  - flag: --cluster
    description: 集群管理
  - flag: --rdb
    description: 导出 RDB 文件
  - flag: --pipe
    description: 批量导入
  examples:
  - command: redis-cli --bigkeys
    description: 扫描并报告大 key
  - command: redis-cli --cluster check 127.0.0.1:7000
    description: 检查集群健康状态
  - command: redis-cli --cluster reshard 127.0.0.1:7000
    description: 重新分片
  - command: redis-cli MEMORY USAGE mykey
    description: 查看 key 内存占用
  - command: redis-cli INFO memory
    description: 查看内存使用详情
  platforms:
  - linux
  - darwin
  risks:
  - level: high
    description: reshard 影响集群数据分布，FLUSHALL 清空所有数据
  related_commands:
  - redis-server
  - redis-sentinel
- name: mysql (tuning)
  category: 数据库工具/运维操作
  install_required: true
  install_method: 随 MySQL 安装
  description: MySQL 性能调优和状态诊断
  usage:
  - mysql -e "[SQL]" [选项]
  options:
  - flag: -e
    description: 执行 SQL
  - flag: --table
    description: 表格输出
  examples:
  - command: mysql -e "SHOW PROCESSLIST;"
    description: 查看当前连接和查询
  - command: mysql -e "SHOW ENGINE INNODB STATUS\G"
    description: InnoDB 引擎状态（锁、缓冲池）
  - command: mysql -e "EXPLAIN ANALYZE SELECT * FROM users WHERE email='x';"
    description: 分析查询执行计划
  - command: mysql -e "SHOW GLOBAL STATUS LIKE 'Threads%';"
    description: 查看线程状态
  - command: mysql -e "SELECT * FROM information_schema.INNODB_LOCK_WAITS;"
    description: 查看锁等待
  platforms:
  - linux
  - darwin
  - windows
  risks:
  - level: low
    description: 查询操作风险低，KILL 终止查询需确认
  related_commands:
  - mysqldump
  - pt-query-digest
- name: psql (operations)
  category: 数据库工具/运维操作
  install_required: true
  install_method: 随 PostgreSQL 安装
  description: PostgreSQL 运维操作（VACUUM、复制、扩展）
  usage:
  - psql [选项] -c "[SQL]"
  options:
  - flag: -c
    description: 执行命令
  - flag: -x
    description: 扩展显示模式
  - flag: --no-psqlrc
    description: 不加载配置
  examples:
  - command: psql -c "VACUUM ANALYZE users;"
    description: 清理并更新统计信息
  - command: psql -c "SELECT * FROM pg_stat_activity WHERE state = 'active';"
    description: 查看活跃查询
  - command: psql -c "SELECT * FROM pg_stat_replication;"
    description: 查看复制状态
  - command: psql -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
    description: 安装扩展
  - command: psql -c "SELECT pg_size_pretty(pg_database_size('mydb'));"
    description: 查看数据库大小
  platforms:
  - linux
  - darwin
  risks:
  - level: medium
    description: VACUUM FULL 锁表，pg_terminate_backend 终止连接
  related_commands:
  - pg_dump
  - pg_basebackup
