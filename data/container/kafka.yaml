category: 容器编排/消息队列
description: Apache Kafka分布式流处理平台
commands:
- name: kafka
  category: 容器编排/消息队列
  install_required: true
  install_method: 参考 https://kafka.apache.org/quickstart
  description: Apache Kafka分布式消息队列
  usage:
  - kafka-server-start.sh [选项] server.properties
  options:
  - flag: --override
    description: 覆盖配置属性
  examples:
  - command: kafka-server-start.sh config/server.properties
    description: 启动Kafka服务器
  - command: kafka-topics.sh --create --topic mytopic --bootstrap-server localhost:9092
    description: 创建Topic
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - zookeeper
  - kafka-console-producer
  - kafka-console-consumer
