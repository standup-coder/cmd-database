category: "AI基础设施/模型服务"
description: "模型服务工具(BentoML)相关命令"
commands:
  - name: bentoml
    category: "AI基础设施/模型服务"
    install_required: true
    install_method: "pip install bentoml"
    description: "BentoML 命令行客户端，用于模型打包和服务"
    usage:
      - "bentoml [COMMAND] [OPTIONS]"
    options:
      - flag: "serve"
        description: "启动BentoML服务"
      - flag: "build"
        description: "从bentofile.yaml构建一个Bento"
      - flag: "models"
        description: "管理本地模型库 (list, get, delete, import, export)"
      - flag: "containerize"
        description: "将Bento打包成Docker镜像"
    examples:
      - command: "bentoml serve my_service:latest"
        description: "启动最新的'my_service'服务"
      - command: "bentoml build"
        description: "根据当前目录的bentofile.yaml构建Bento"
      - command: "bentoml models list"
        description: "列出所有本地保存的模型"
      - command: "bentoml containerize my_service:latest -t my_service_image:1.0"
        description: "将Bento打包为Docker镜像"
    platforms:
      - "linux"
      - "darwin"
      - "windows"
    related_commands:
      - "mlflow"
      - "torchrun"
    risks:
      - level: medium
        description: "会修改本地环境或依赖"
    references:
      - "https://docs.bentoml.com/en/latest/reference/cli.html"

  - name: tritonserver
    category: "AI基础设施/模型服务"
    install_required: true
    install_method: "docker pull nvcr.io/nvidia/tritonserver:24.01-py3"
    description: "NVIDIA Triton推理服务器，支持TensorRT、ONNX、PyTorch、Python后端，多模型并行服务"
    usage:
      - "tritonserver [OPTIONS]"
    options:
      - flag: "--model-repository"
        description: "模型仓库路径"
      - flag: "--http-port"
        description: "HTTP服务端口号"
      - flag: "--grpc-port"
        description: "gRPC服务端口号"
      - flag: "--strict-model-config"
        description: "严格模型配置检查"
      - flag: "--load-model"
        description: "指定加载的模型"
    examples:
      - command: "tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001"
        description: "启动Triton服务加载/models目录下所有模型"
      - command: "docker run --gpus all --rm -p 8000:8000 -p 8001:8001 -v $(pwd)/models:/models nvcr.io/nvidia/tritonserver:24.01-py3 tritonserver --model-repository=/models"
        description: "Docker GPU部署Triton推理服务"
    platforms:
      - "linux"
    related_commands:
      - "bentoml"
      - "torchserve"
    risks:
      - level: medium
        description: "生产部署需配置认证和资源限制"
    notes:
      - "需要NVIDIA GPU和Docker环境"
      - "模型配置文件(config.pbtxt)需正确编写"
    references:
      - "https://github.com/triton-inference-server/server"

  - name: torchserve
    category: "AI基础设施/模型服务"
    install_required: true
    install_method: "pip install torchserve torch-model-archiver"
    description: "PyTorch官方模型服务框架，支持模型打包、A/B测试、多模型服务、自定义处理器"
    usage:
      - "torchserve [COMMAND] [OPTIONS]"
    options:
      - flag: "--start"
        description: "启动服务"
      - flag: "--stop"
        description: "停止服务"
      - flag: "--model-store"
        description: "模型存储目录"
      - flag: "--models"
        description: "加载的模型列表"
      - flag: "--ts-config"
        description: "配置文件路径"
    examples:
      - command: "torchserve --start --model-store model_store --models my_model=my_model.mar"
        description: "启动服务并加载模型"
      - command: "torch-model-archiver --model-name my_model --version 1.0 --model-file model.py --serialized-file model.pt --handler custom_handler.py --export-path model_store"
        description: "将PyTorch模型打包为.mar文件"
      - command: "torchserve --stop"
        description: "停止TorchServe服务"
    platforms:
      - "linux"
      - "darwin"
      - "windows"
    related_commands:
      - "bentoml"
      - "tritonserver"
    risks:
      - level: medium
        description: "生产部署需配置安全策略"
    references:
      - "https://pytorch.org/serve/"

  - name: kserve
    category: "AI基础设施/模型服务"
    install_required: true
    install_method: "kubectl apply -f https://github.com/kserve/kserve/releases/download/v0.11.0/kserve.yaml"
    description: "KServe Kubernetes原生模型服务平台，支持自动扩缩容、金丝雀发布、多框架运行时"
    usage:
      - "kubectl apply -f [OPTIONS]"
    options:
      - flag: "apiVersion: serving.kserve.io/v1beta1"
        description: "KServe API版本"
      - flag: "kind: InferenceService"
        description: "推理服务资源类型"
      - flag: "predictor"
        description: "预测器配置(sklearn, xgboost, tensorflow, pytorch, triton)"
    examples:
      - command: "kubectl apply -f sklearn-iris.yaml"
        description: "部署sklearn模型推理服务"
      - command: "kubectl apply -n kserve-test -f pytorch-model.yaml"
        description: "部署PyTorch模型到指定命名空间"
      - command: "kubectl get inferenceservices"
        description: "查看所有推理服务状态"
    platforms:
      - "linux"
      - "darwin"
      - "windows"
    related_commands:
      - "bentoml"
      - "tritonserver"
    risks:
      - level: medium
        description: "部署到K8s集群，需谨慎操作"
    references:
      - "https://kserve.github.io/website/"
