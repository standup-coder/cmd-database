- name: grpo
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install trl"
  description: "GRPO (Group Relative Policy Optimization) 强化学习训练，DeepSeek-R1核心训练方法，无需价值模型"
  usage:
  - "python grpo_train.py (使用trl库)"
  options:
  - flag: "--model_name"
    description: "基础模型"
  - flag: "--reward_funcs"
    description: "奖励函数列表"
  - flag: "--num_generations"
    description: "每组生成样本数"
  - flag: "--beta"
    description: "KL散度惩罚系数"
  examples:
  - command: "python -c \"from trl import GRPOTrainer; trainer = GRPOTrainer(model='Qwen/Qwen2.5-7B',
      reward_funcs=[accuracy_reward, format_reward])\""
    description: "GRPO训练配置"
  - command: "python grpo_train.py --model_name Qwen2.5-7B --num_generations 8 --beta
      0.04 --output_dir ./grpo_output"
    description: "完整GRPO训练流程"
  platforms:
  - "linux"
  - "darwin"
  related_commands:
  - "trl"
  - "dpo"
  risks:
  - level: medium
    description: "RL训练不稳定，需监控奖励曲线"
  references:
  - "https://huggingface.co/docs/trl/grpo_trainer"

- name: dpo
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install trl"
  description: "DPO (Direct Preference Optimization) 直接偏好优化，无需奖励模型直接从偏好数据微调"
  usage:
