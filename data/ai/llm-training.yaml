category: "AI基础设施/大模型训练"
description: "大语言模型训练与微调工具链，涵盖分布式训练、参数高效微调、量化训练、模型评估"
commands:
- name: deepspeed
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install deepspeed"
  description: "微软DeepSpeed大规模分布式训练框架，支持ZeRO优化、3D并行、Offload"
  usage:
  - "deepspeed [OPTIONS] SCRIPT.py [ARGS...]"
  options:
  - flag: "--num_gpus"
    description: "使用的GPU数量"
  - flag: "--master_port"
    description: "分布式训练主节点端口"
  - flag: "--include"
    description: "指定使用的GPU，如 'localhost:0,1,2,3'"
  - flag: "--exclude"
    description: "排除指定的GPU"
  examples:
  - command: "deepspeed --num_gpus=4 train.py --deepspeed ds_config.json"
    description: "使用4张GPU和DeepSpeed配置文件启动训练"
  - command: "deepspeed --include='localhost:0,1,2,3,4,5,6,7' train.py"
    description: "指定使用8张GPU进行训练"
  - command: "deepspeed train.py --deepspeed ds_config_zero3.json"
    description: "使用ZeRO-3优化策略训练大模型"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "accelerate"
  - "torchrun"
  risks:
  - level: medium
    description: "大规模分布式训练消耗大量GPU资源，需合理配置"
  references:
  - "https://www.deepspeed.ai/"

- name: accelerate
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install accelerate"
  description: "HuggingFace Accelerate分布式训练配置工具，简化多GPU/TPU训练"
  usage:
  - "accelerate [COMMAND] [OPTIONS]"
  options:
  - flag: "launch"
    description: "启动分布式训练脚本"
  - flag: "config"
    description: "交互式配置分布式训练环境"
  - flag: "estimate-memory"
    description: "估算模型训练所需内存"
  - flag: "test"
    description: "测试分布式环境配置"
  examples:
  - command: "accelerate config"
    description: "交互式配置分布式训练参数"
  - command: "accelerate launch --num_processes=4 train.py"
    description: "使用4进程启动分布式训练"
  - command: "accelerate launch --mixed_precision=fp16 train.py"
    description: "使用FP16混合精度训练"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "deepspeed"
  - "torchrun"
  risks:
  - level: low
    description: "配置不当可能导致训练效率降低"
  references:
  - "https://huggingface.co/docs/accelerate"

- name: lightning
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install pytorch-lightning"
  description: "PyTorch Lightning高级训练框架，简化分布式训练、混合精度、Checkpoint管理"
  usage:
  - "python train.py [OPTIONS]"
  options:
  - flag: "--devices"
    description: "使用的设备数量，如 '4' 或 'auto'"
  - flag: "--accelerator"
    description: "加速器类型 (gpu, cpu, tpu, mps)"
  - flag: "--strategy"
    description: "分布式策略 (ddp, deepspeed, fsdp)"
  - flag: "--precision"
    description: "精度模式 (16-mixed, bf16-mixed, 32)"
  examples:
  - command: "python train.py --devices=4 --accelerator=gpu --strategy=ddp"
    description: "4卡GPU DDP分布式训练"
  - command: "python train.py --devices=auto --strategy=deepspeed_stage_2"
    description: "自动检测GPU并使用DeepSpeed Stage 2"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "torchrun"
  - "deepspeed"
  risks:
  - level: low
    description: "框架自动管理资源，风险较低"
  references:
  - "https://lightning.ai/docs/pytorch/"

- name: axolotl
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install axolotl[flash-attn]"
  description: "YAML配置式LLM微调工具，支持LoRA、QLoRA、全参数微调"
  usage:
  - "axolotl [COMMAND] [OPTIONS]"
  options:
  - flag: "train"
    description: "启动训练"
  - flag: "merge-lora"
    description: "合并LoRA权重到基础模型"
  - flag: "--config"
    description: "指定YAML配置文件路径"
  examples:
  - command: "axolotl train examples/llama-3/lora.yml"
    description: "使用LoRA配置微调LLaMA-3"
  - command: "axolotl merge-lora --config=config.yml"
    description: "合并训练好的LoRA权重"
  - command: "axolotl train config.yml --prepare-dataset"
    description: "仅准备数据集不开始训练"
  platforms:
  - "linux"
  - "darwin"
  related_commands:
  - "unsloth"
  - "llm-factory"
  risks:
  - level: medium
    description: "微调会修改模型权重，需备份基础模型"
  references:
  - "https://github.com/axolotl-ai-cloud/axolotl"

- name: unsloth
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install unsloth"
  description: "2-5倍加速的LLM微调框架，支持LoRA和QLoRA，内存占用减少80%"
  usage:
  - "python train.py (使用unsloth库)"
  options:
  - flag: "FastLanguageModel.from_pretrained"
    description: "加载优化后的预训练模型"
  - flag: "FastLanguageModel.get_peft_model"
    description: "应用PEFT微调配置"
  examples:
  - command: "python -c \"from unsloth import FastLanguageModel; model, tokenizer
      = FastLanguageModel.from_pretrained('unsloth/Llama-3.2-1B')\""
    description: "快速加载Unsloth优化模型"
  - command: "python finetune.py --use_unsloth --max_seq_length=2048"
    description: "使用Unsloth加速微调"
  platforms:
  - "linux"
  - "darwin"
  related_commands:
  - "axolotl"
  - "trl"
  risks:
  - level: low
    description: "优化后的训练更稳定，内存占用更低"
  references:
  - "https://github.com/unslothai/unsloth"

- name: trl
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install trl"
  description: "Transformers Reinforcement Learning，支持SFT、DPO、PPO、ORPO训练"
  usage:
  - "trl [COMMAND] [OPTIONS]"
  options:
  - flag: "sft"
    description: "监督微调 (Supervised Fine-Tuning)"
  - flag: "dpo"
    description: "直接偏好优化 (Direct Preference Optimization)"
  - flag: "ppo"
    description: "近端策略优化 (Proximal Policy Optimization)"
  examples:
  - command: "trl sft --model_name_or_path meta-llama/Llama-2-7b --dataset_name tatsu-lab/alpaca"
    description: "使用Alpaca数据集进行SFT微调"
  - command: "trl dpo --model_name_or_path model-sft --dataset_name anthropic/hh-rlhf"
    description: "使用RLHF数据进行DPO训练"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "axolotl"
  - "peft"
  risks:
  - level: medium
    description: "RL训练过程不稳定，需监控训练指标"
  references:
  - "https://huggingface.co/docs/trl"

- name: peft
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install peft"
  description: "参数高效微调库，支持LoRA、QLoRA、IA3、Prompt Tuning等方法"
  usage:
  - "python train.py (导入peft库使用)"
  options:
  - flag: "LoraConfig"
    description: "配置LoRA微调参数(rank, alpha, target_modules)"
  - flag: "get_peft_model"
    description: "将PEFT配置应用到基础模型"
  - flag: "PeftModel.from_pretrained"
    description: "加载已保存的PEFT模型"
  examples:
  - command: "python lora_train.py --r=16 --lora_alpha=32 --target_modules=q_proj,v_proj"
    description: "使用rank=16的LoRA微调注意力层"
  - command: "python -c \"from peft import PeftModel; model = PeftModel.from_pretrained(base_model,
      './lora-weights')\""
    description: "加载LoRA权重到基础模型"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "bitsandbytes"
  - "trl"
  risks:
  - level: low
    description: "只微调少量参数，风险较低"
  references:
  - "https://huggingface.co/docs/peft"

- name: bitsandbytes
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install bitsandbytes"
  description: "8-bit/4-bit量化库，支持QLoRA在消费级GPU上训练大模型"
  usage:
  - "python train.py (导入bitsandbytes库使用)"
  options:
  - flag: "BitsAndBytesConfig"
    description: "配置量化参数(load_in_4bit, bnb_4bit_compute_dtype)"
  - flag: "load_in_8bit"
    description: "使用8-bit量化加载模型"
  - flag: "load_in_4bit"
    description: "使用4-bit量化加载模型(NF4/FP4)"
  examples:
  - command: "python qlora_train.py --load_in_4bit --bnb_4bit_quant_type=nf4"
    description: "使用NF4量化进行QLoRA训练"
  - command: "python inference.py --load_in_8bit --device_map=auto"
    description: "8-bit量化推理，自动分配层到GPU/CPU"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "peft"
  - "unsloth"
  risks:
  - level: medium
    description: "量化可能带来精度损失，需评估模型质量"
  references:
  - "https://github.com/TimDettmers/bitsandbytes"

- name: flash-attn
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install flash-attn --no-build-isolation"
  description: "Flash Attention高效注意力实现，2-4倍加速长序列训练，显著降低内存占用"
  usage:
  - "python train.py (导入flash_attn库使用)"
  options:
  - flag: "flash_attn_func"
    description: "Flash Attention核心函数"
  - flag: "FlashAttention2"
    description: "Flash Attention 2模块"
  examples:
  - command: "python train.py --use_flash_attention_2 --max_seq_length=32768"
    description: "使用Flash Attention 2训练32K长文本"
  - command: "pip install flash-attn --no-build-isolation"
    description: "安装Flash Attention(需要CUDA)"
  platforms:
  - "linux"
  related_commands:
  - "xformers"
  - "unsloth"
  risks:
  - level: low
    description: "计算结果与标准Attention一致，仅优化性能"
  notes:
  - "安装需要CUDA环境，编译时间较长"
  - "仅支持Linux，Windows需使用WSL"
  references:
  - "https://github.com/Dao-AILab/flash-attention"

- name: xformers
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install xformers"
  description: "Meta开源的高效Transformer组件库，提供memory_efficient_attention等优化算子"
  usage:
  - "python train.py (导入xformers库使用)"
  options:
  - flag: "memory_efficient_attention"
    description: "内存高效注意力实现"
  - flag: "xFormersConfig"
    description: "配置Transformer优化策略"
  examples:
  - command: "python train.py --use_xformers --attention_op=memory_efficient"
    description: "使用xFormers内存高效注意力训练"
  - command: "python -c \"from xformers.ops import memory_efficient_attention; y =
      memory_efficient_attention(q, k, v)\""
    description: "直接使用xFormers注意力算子"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "flash-attn"
  - "lightning"
  risks:
  - level: low
    description: "纯性能优化组件，不改变训练逻辑"
  references:
  - "https://github.com/facebookresearch/xformers"

- name: lm-eval
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install lm-eval"
  description: "EleutherAI语言模型评估框架，支持HellaSwag、MMLU、ARC等100+基准测试"
  usage:
  - "lm_eval [OPTIONS]"
  options:
  - flag: "--model"
    description: "模型类型 (hf, vllm, gguf)"
  - flag: "--tasks"
    description: "评估任务列表，逗号分隔"
  - flag: "--batch_size"
    description: "推理批次大小"
  - flag: "--output_path"
    description: "结果输出目录"
  examples:
  - command: "lm_eval --model hf --model_args pretrained=meta-llama/Llama-2-7b --tasks
      hellaswag,arc_challenge,mmlu --batch_size=8"
    description: "在多个基准上评估LLaMA-2-7B"
  - command: "lm_eval --model vllm --model_args pretrained=Qwen/Qwen2-7B --tasks mmlu
      --batch_size=auto"
    description: "使用vLLM加速评估"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "opencompass"
  - "alpaca-eval"
  risks:
  - level: low
    description: "只读评估操作，无风险"
  references:
  - "https://github.com/EleutherAI/lm-evaluation-harness"

- name: opencompass
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install -U opencompass"
  description: "上海AI Lab开源的模型评测平台，支持50+数据集和多种评测范式"
  usage:
  - "opencompass [COMMAND] [OPTIONS]"
  options:
  - flag: "run"
    description: "运行评测"
  - flag: "--models"
    description: "待评测模型列表"
  - flag: "--datasets"
    description: "评测数据集配置"
  - flag: "--work-dir"
    description: "工作目录"
  examples:
  - command: "opencompass run --models hf_internlm2_5_7b_chat --datasets mmlu_ppl
      cmmlu_ppl"
    description: "评测InternLM2.5在MMLU和CMMLU上的表现"
  - command: "opencompass run --models llama3_8b qwen2_7b --datasets all"
    description: "多模型全数据集评测对比"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "lm-eval"
  - "alpaca-eval"
  risks:
  - level: low
    description: "评估操作无副作用"
  references:
  - "https://github.com/open-compass/opencompass"

- name: alpaca-eval
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install alpaca-eval"
  description: "指令跟随能力评估工具，使用GPT-4作为裁判对模型输出进行排序"
  usage:
  - "alpaca_eval [OPTIONS]"
  options:
  - flag: "--model_outputs"
    description: "模型输出JSON文件路径"
  - flag: "--reference_outputs"
    description: "参考模型输出(默认Davinci-003)"
  - flag: "--annotators_config"
    description: "裁判模型配置(默认GPT-4)"
  examples:
  - command: "alpaca_eval --model_outputs outputs.json"
    description: "评估模型在AlpacaEval基准上的表现"
  - command: "alpaca_eval --model_outputs my_model.json --annotators_config=weighted_alpaca_eval_gpt4_turbo"
    description: "使用Weighted AlpacaEval更准确地评估"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "lm-eval"
  - "opencompass"
  risks:
  - level: low
    description: "调用OpenAI API需消耗token，注意成本"
  references:
  - "https://github.com/tatsu-lab/alpaca_eval"

- name: llm-factory
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "git clone https://github.com/hiyouga/LLaMA-Factory.git && cd LLaMA-Factory
    && pip install -e '.[torch,metrics]'"
  description: "一站式LLM训练平台，支持100+模型预训练、微调、RLHF、DPO、量化、推理"
  usage:
  - "llamafactory-cli [COMMAND] [OPTIONS]"
  options:
  - flag: "train"
    description: "启动训练"
  - flag: "export"
    description: "导出/合并模型"
  - flag: "api"
    description: "启动API服务"
  - flag: "--stage"
    description: "训练阶段 (sft, rm, ppo, dpo, kto)"
  examples:
  - command: "llamafactory-cli train --stage sft --model_name_or_path meta-llama/Llama-2-7b
      --dataset alpaca_gpt4_en"
    description: "使用Alpaca数据集进行SFT微调"
  - command: "llamafactory-cli export --model_name_or_path merged_model --export_dir
      ./export --export_size 2"
    description: "导出模型并分片为2GB每个文件"
  - command: "llamafactory-cli api --model_name_or_path merged_model --template llama2"
    description: "启动OpenAI兼容API服务"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "axolotl"
  - "unsloth"
  risks:
  - level: medium
    description: "训练消耗大量计算资源，量化可能损失精度"
  references:
  - "https://github.com/hiyouga/LLaMA-Factory"

- name: megatron-lm
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "git clone https://github.com/NVIDIA/Megatron-LM.git"
  description: "NVIDIA Megatron-LM大规模语言模型训练框架，支持张量/流水线/序列并行"
  usage:
  - "python pretrain_gpt.py [OPTIONS]"
  options:
  - flag: "--tensor-model-parallel-size"
    description: "张量并行度"
  - flag: "--pipeline-model-parallel-size"
    description: "流水线并行度"
  - flag: "--sequence-parallel"
    description: "启用序列并行"
  - flag: "--use-distributed-optimizer"
    description: "使用分布式优化器"
  examples:
  - command: "python pretrain_gpt.py --tensor-model-parallel-size 8 --pipeline-model-parallel-size
      8 --num-layers 96 --hidden-size 12288"
    description: "8x8并行训练GPT-3级别大模型"
  - command: "python tools/generate_samples_gpt.py --load checkpoint --num-samples
      100"
    description: "从检查点生成样本"
  platforms:
  - "linux"
  related_commands:
  - "deepspeed"
  - "torchrun"
  risks:
  - level: high
    description: "大规模并行训练配置复杂，需专业调优"
  - level: high
    description: 大规模训练任务会占用大量计算资源，请确认集群配额、显存和成本预算。
  references:
  - "https://github.com/NVIDIA/Megatron-LM"

- name: colossal-ai
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install colossalai"
  description: "Colossal-AI统一深度学习加速系统，支持 Gemini、ZeRO、Pipeline 并行"
  usage:
  - "colossalai run [OPTIONS]"
  options:
  - flag: "--nproc_per_node"
    description: "每节点进程数"
  - flag: "--host"
    description: "主机文件"
  - flag: "--master_addr"
    description: "主节点地址"
  examples:
  - command: "colossalai run --nproc_per_node 8 train.py --config config.py"
    description: "Colossal-AI启动8卡训练"
  - command: "python -m colossalai.cli.launch --nproc_per_node=4 train.py"
    description: "使用CLI启动器运行训练"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "deepspeed"
  - "accelerate"
  risks:
  - level: medium
    description: "并行策略选择不当影响训练效率"
  references:
  - "https://colossalai.org/"

- name: composer
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install mosaicml"
  description: "MosaicML Composer高效训练库，内置100+算法和优化方法"
  usage:
  - "composer [OPTIONS] SCRIPT.py"
  options:
  - flag: "--fsdp_config"
    description: "FSDP配置文件"
  - flag: "--autoresume"
    description: "自动从断点恢复"
  - flag: "--run_name"
    description: "实验名称"
  examples:
  - command: "composer train.py --fsdp_config fsdp_config.yaml"
    description: "FSDP训练"
  - command: "composer train.py --algorithms BlurPool SAM LabelSmoothing"
    description: "启用多个训练优化算法"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "lightning"
  - "deepspeed"
  risks:
  - level: low
    description: "算法组合需验证兼容性"
  references:
  - "https://www.mosaicml.com/"

- name: mosaicml-streaming
  category: "AI基础设施/大模型训练"
  install_required: true
  install_method: "pip install streaming"
  description: "MosaicML Streaming高效数据集流式加载，支持多种云存储和Sharding"
