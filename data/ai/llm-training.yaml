  options:
  - flag: "--beta"
    description: "温度参数，控制与参考模型的偏离程度"
  - flag: "--loss_type"
    description: "损失类型 (sigmoid, hinge, ipo, exppo)"
  - flag: "--label_smoothing"
    description: "标签平滑系数"
  examples:
  - command: "python -c \"from trl import DPOTrainer; trainer = DPOTrainer(model,
      ref_model, beta=0.1, train_dataset=dataset)\""
    description: "DPO训练配置"
  - command: "python dpo_train.py --model_name llama-3-8b --beta 0.1 --loss_type sigmoid
      --dataset preference_data.json"
    description: "完整DPO偏好微调"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "grpo"
  - "trl"
  risks:
  - level: medium
    description: "偏好数据质量直接影响效果"
  references:
  - "https://huggingface.co/docs/trl/dpo_trainer"

