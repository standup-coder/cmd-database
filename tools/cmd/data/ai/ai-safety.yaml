category: "AI基础设施/AI安全"
description: "LLM模型安全扫描、漏洞检测、偏见审计与对抗测试，生产部署前合规检查"
commands:
- name: garak
  category: "AI基础设施/AI安全"
  install_required: true
  install_method: "pip install garak"
  description: "Garak LLM漏洞扫描框架，探测越狱、提示注入、数据泄露、幻觉等安全风险"
  usage:
  - "garak [OPTIONS]"
  options:
  - flag: "--model_type"
    description: "模型类型 (openai, huggingface, replicate)"
  - flag: "--model_name"
    description: "模型名称"
  - flag: "--probes"
    description: "探测插件列表"
  - flag: "--generations"
    description: "每探测生成次数"
  examples:
  - command: "garak --model_type openai --model_name gpt-4 --probes all"
    description: "全面扫描GPT-4安全风险"
  - command: "garak --model_type huggingface --model_name meta-llama/Llama-2-7b-chat-hf
      --probes encoding,dan,knownbadsignatures"
    description: "针对性检测已知攻击向量"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "red-teaming"
  - "llm-guard"
  risks:
  - level: high
    description: "安全测试可能触发内容过滤器，需在隔离环境执行"
  - level: high
    description: 安全测试可能触发告警或访问敏感内容，请在授权和可监控环境下执行。
  references:
  - "https://github.com/leondz/garak"

- name: modelscan
  category: "AI基础设施/AI安全"
  install_required: true
  install_method: "pip install modelscan"
  description: "ProtectAI ModelScan模型文件安全扫描，检测Pickle反序列化漏洞、恶意代码注入"
  usage:
  - "modelscan [OPTIONS] PATH"
  options:
  - flag: "--path"
    description: "扫描路径"
  - flag: "--format"
    description: "输出格式 (json, table)"
  examples:
  - command: "modelscan /path/to/models/"
    description: "扫描模型目录"
  - command: "modelscan model.pkl --format json"
    description: "扫描单个Pickle文件并输出JSON"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "safetensors-convert"
  - "garak"
  risks:
  - level: low
    description: "只读扫描不改变文件"
  references:
  - "https://github.com/protectai/modelscan"

- name: llm-guard
  category: "AI基础设施/AI安全"
  install_required: true
  install_method: "pip install llm-guard"
  description: "LLM Guard输入输出安全过滤器，检测PII泄露、毒性、越狱、提示注入"
  usage:
  - "python app.py (使用llm_guard库)"
  - "docker run [OPTIONS] laiyio/llm-guard-api"
  options:
  - flag: "input_scanners"
    description: "输入扫描器列表"
  - flag: "output_scanners"
    description: "输出扫描器列表"
  examples:
  - command: "docker run -p 8000:8000 laiyio/llm-guard-api:latest"
    description: "启动LLM Guard API服务"
  - command: "python -c \"from llm_guard import scan_prompt; result = scan_prompt('prompt',
      scanners=['Anonymize', 'PromptInjection'])\""
    description: "Python调用输入过滤"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "garak"
  - "safety-eval"
  risks:
  - level: low
    description: "过滤器可能误判合法输入，需调优阈值"
  references:
  - "https://github.com/laiyer-ai/llm-guard"

- name: inspect-ai
  category: "AI基础设施/AI安全"
  install_required: true
  install_method: "pip install inspect-ai"
  description: "UK AISI Inspect AI评测框架，系统化评估模型知识、推理、安全性和能力"
  usage:
  - "inspect [COMMAND] [OPTIONS]"
  options:
  - flag: "eval"
    description: "运行评测"
  - flag: "view"
    description: "查看评测结果"
  - flag: "list"
    description: "列出任务"
  examples:
  - command: "inspect eval security_eval.py --model openai/gpt-4"
    description: "运行安全评测"
  - command: "inspect eval math_eval.py --model anthropic/claude-3-sonnet --epochs
      3"
    description: "数学能力多次评测"
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "lm-eval"
  - "safety-eval"
  risks:
  - level: low
    description: "评测框架安全"
  references:
  - "https://github.com/UKGovernmentBEIS/inspect_ai"

- name: neuralsecure
  category: "AI基础设施/AI安全"
  install_required: true
  install_method: "pip install neuralsecure"
  description: "NeuralSecure ML模型安全审计，检测对抗样本脆弱性、成员推断攻击、模型窃取风险"
  usage:
  - "python audit.py (使用neuralsecure库)"
  options:
  - flag: "adversarial_robustness"
    description: "对抗鲁棒性测试"
  - flag: "membership_inference"
    description: "成员推断攻击测试"
  - flag: "model_extraction"
    description: "模型提取攻击测试"
  examples:
  - command: "python audit.py --model ./model.pt --tests adversarial,membership,extraction
      --output report.json"
    description: "全面安全审计"
  - command: python audit.py --model ./model.pt --tests adversarial --output 
      report.json --verbose
    description: 只进行对抗样本审计
  platforms:
  - "linux"
  - "darwin"
  - "windows"
  related_commands:
  - "modelscan"
  - "garak"
  risks:
  - level: medium
    description: "攻击测试需在隔离环境执行"
  references:
  - "https://github.com/protectai/neuralsecure"
