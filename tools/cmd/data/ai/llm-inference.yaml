category: AI基础设施/大模型推理
description: 大语言模型推理部署工具链，涵盖高性能推理引擎、本地运行、服务化部署、交互式Demo
commands:
- name: vllm
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install vllm
  description: vLLM高性能大模型推理引擎，采用PagedAttention实现最高24倍吞吐提升
  usage:
  - vllm serve [OPTIONS]
  - python -m vllm.entrypoints.openai.api_server [OPTIONS]
  options:
  - flag: --model
    description: 模型路径或HuggingFace模型ID
  - flag: --tensor-parallel-size
    description: 张量并行GPU数量
  - flag: --max-model-len
    description: 最大序列长度
  - flag: --gpu-memory-utilization
    description: GPU内存利用率上限(0.0-1.0)
  - flag: --quantization
    description: 量化方式 (awq, gptq, fp8)
  examples:
  - command: vllm serve meta-llama/Llama-3.1-8B-Instruct --tensor-parallel-size 
      2
    description: 2卡张量并行部署LLaMA-3.1-8B
  - command: vllm serve Qwen/Qwen2-72B --tensor-parallel-size 8 --max-model-len 
      32768
    description: 8卡部署Qwen2-72B，支持32K上下文
  - command: vllm serve TheBloke/Llama-2-70B-AWQ --quantization awq 
      --gpu-memory-utilization 0.9
    description: AWQ量化部署，节省显存
  platforms:
  - linux
  - darwin
  related_commands:
  - sglang
  - lmdeploy
  risks:
  - level: medium
    description: 高并发推理可能耗尽GPU资源
  references:
  - https://docs.vllm.ai/
- name: sglang
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install sglang
  description: SGLang结构化生成语言模型服务，支持RadixAttention缓存、多模态推理
  usage:
  - python -m sglang.launch_server [OPTIONS]
  options:
  - flag: --model-path
    description: 模型路径
  - flag: --tp-size
    description: 张量并行大小
  - flag: --mem-fraction-static
    description: 静态内存分配比例
  - flag: --enable-torch-compile
    description: 启用PyTorch编译优化
  examples:
  - command: python -m sglang.launch_server --model-path 
      meta-llama/Llama-3.1-8B-Instruct --tp-size 2
    description: 2卡部署LLaMA-3.1推理服务
  - command: python -m sglang.launch_server --model-path 
      Qwen/Qwen2-VL-7B-Instruct
    description: 部署Qwen2-VL多模态推理服务
  platforms:
  - linux
  - darwin
  related_commands:
  - vllm
  - lmdeploy
  risks:
  - level: medium
    description: 推理服务需合理配置并发限制
  references:
  - https://github.com/sgl-project/sglang
- name: lmdeploy
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install lmdeploy
  description: 上海AI Lab开源的大模型部署工具，支持TurboMind引擎和PyTorch引擎
  usage:
  - lmdeploy [COMMAND] [OPTIONS]
  options:
  - flag: serve
    description: 启动推理服务
  - flag: lite
    description: 轻量级本地推理
  - flag: chat
    description: 交互式对话
  - flag: convert
    description: 模型格式转换
  examples:
  - command: lmdeploy serve api_server internlm/internlm2_5-7b-chat
    description: 部署InternLM2.5 API服务
  - command: lmdeploy lite auto_awq internlm/internlm2_5-7b-chat --work-dir 
      ./awq_model
    description: AWQ量化模型
  - command: lmdeploy chat internlm/internlm2_5-7b-chat
    description: 本地交互式对话
  platforms:
  - linux
  - darwin
  related_commands:
  - vllm
  - sglang
  risks:
  - level: medium
    description: 模型转换后需验证输出一致性
  references:
  - https://github.com/InternLM/lmdeploy
- name: llama.cpp
  category: AI基础设施/大模型推理
  install_required: true
  install_method: git clone https://github.com/ggerganov/llama.cpp && make
  description: llama.cpp纯C/C++实现的LLM推理，支持GGUF量化，可在CPU/边缘设备运行
  usage:
  - ./main [OPTIONS]
  - ./server [OPTIONS]
  options:
  - flag: -m
    description: GGUF模型文件路径
  - flag: -n
    description: 生成token数量
  - flag: --temp
    description: 采样温度(默认0.8)
  - flag: -ngl
    description: GPU加载的层数
  - flag: -c
    description: 上下文大小
  examples:
  - command: ./main -m models/llama-3.1-8b.Q4_K_M.gguf -n 512 --temp 0.7 -p 
      'What is machine learning?'
    description: CPU推理运行量化模型
  - command: ./server -m models/llama-3.1-8b.Q4_K_M.gguf --host 0.0.0.0 --port 
      8080
    description: 启动HTTP推理服务
  - command: ./main -m model.gguf -ngl 35 -c 8192
    description: GPU卸载35层，8K上下文推理
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - ollama
  - gguf-convert
  risks:
  - level: low
    description: 本地推理无网络风险
  references:
  - https://github.com/ggerganov/llama.cpp
- name: ollama
  category: AI基础设施/大模型推理
  install_required: true
  install_method: curl -fsSL https://ollama.com/install.sh | sh
  description: Ollama本地大模型运行管理工具，一键下载和运行各类开源模型
  usage:
  - ollama [COMMAND] [OPTIONS]
  options:
  - flag: run
    description: 运行模型
  - flag: pull
    description: 下载模型
  - flag: list
    description: 列出本地模型
  - flag: serve
    description: 启动API服务
  - flag: create
    description: 从Modelfile创建模型
  examples:
  - command: ollama run llama3.1
    description: 下载并运行LLaMA-3.1模型
  - command: ollama run qwen2:72b
    description: 运行Qwen2-72B模型
  - command: ollama serve
    description: 启动Ollama API服务(默认端口11434)
  - command: ollama create my-model -f Modelfile
    description: 使用Modelfile创建自定义模型
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - llama.cpp
  - vllm
  risks:
  - level: low
    description: 本地运行，风险可控
  references:
  - https://ollama.com/
- name: text-generation-inference
  category: AI基础设施/大模型推理
  install_required: true
  install_method: docker pull 
    ghcr.io/huggingface/text-generation-inference:latest
  description: HuggingFace TGI文本生成推理服务，生产级部署方案
  usage:
  - docker run [OPTIONS] ghcr.io/huggingface/text-generation-inference:latest
  options:
  - flag: --model-id
    description: HuggingFace模型ID
  - flag: --sharded
    description: 启用模型分片
  - flag: --num-shard
    description: 分片数量(GPU数)
  - flag: --quantize
    description: 量化方式(awq,gptq,bitsandbytes)
  examples:
  - command: docker run --gpus all -p 8080:80 
      ghcr.io/huggingface/text-generation-inference:latest --model-id 
      meta-llama/Llama-3.1-8B-Instruct
    description: Docker部署LLaMA-3.1推理服务
  - command: docker run --gpus all -p 8080:80 
      ghcr.io/huggingface/text-generation-inference:latest --model-id 
      meta-llama/Llama-3.1-70B-Instruct --sharded true --num-shard 4
    description: 4卡分片部署70B模型
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - vllm
  - sglang
  risks:
  - level: medium
    description: 生产部署需配置安全认证
  references:
  - https://huggingface.co/docs/text-generation-inference
- name: tensorrt-llm
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install tensorrt-llm
  description: NVIDIA TensorRT-LLM推理优化库，针对NVIDIA GPU极致优化
  usage:
  - trtllm-build [OPTIONS]
  - python run.py [OPTIONS]
  options:
  - flag: --checkpoint_dir
    description: 检查点目录
  - flag: --output_dir
    description: TensorRT引擎输出目录
  - flag: --dtype
    description: 数据类型 (float16, bfloat16, float32)
  - flag: --max_batch_size
    description: 最大批次大小
  examples:
  - command: trtllm-build --checkpoint_dir ./tllm_checkpoint --output_dir 
      ./trt_engines --gemm_plugin float16
    description: 构建TensorRT推理引擎
  - command: python run.py --engine_dir=./trt_engines --max_output_len=512
    description: 使用TensorRT引擎推理
  platforms:
  - linux
  - windows
  related_commands:
  - vllm
  - onnxruntime
  risks:
  - level: medium
    description: 需NVIDIA GPU和CUDA环境，引擎构建耗时
  notes:
  - 仅支持NVIDIA GPU
  - 引擎绑定特定GPU架构，不同GPU需重新构建
  references:
  - https://github.com/NVIDIA/TensorRT-LLM
- name: onnxruntime
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install onnxruntime-gpu
  description: ONNX Runtime跨平台推理加速引擎，支持CPU/GPU/边缘设备
  usage:
  - python inference.py (使用onnxruntime库)
  options:
  - flag: InferenceSession
    description: 创建推理会话
  - flag: run
    description: 执行推理
  examples:
  - command: python -c "import onnxruntime as ort; sess = 
      ort.InferenceSession('model.onnx'); outputs = sess.run(None, inputs)"
    description: 加载ONNX模型并推理
  - command: python export_onnx.py --model meta-llama/Llama-2-7b --output 
      model.onnx
    description: 将HuggingFace模型导出为ONNX格式
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - optimum-cli
  - openvino
  risks:
  - level: low
    description: 推理操作无副作用
  references:
  - https://onnxruntime.ai/
- name: openvino
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install openvino
  description: Intel OpenVINO工具包，针对Intel CPU/GPU/NPU优化的推理框架
  usage:
