  - benchmark_app [OPTIONS]
  options:
  - flag: --input_model
    description: 输入模型路径
  - flag: --output_model
    description: 输出IR模型路径
  - flag: --compress_to_fp16
    description: 压缩为FP16
  examples:
  - command: ovc model.onnx --compress_to_fp16
    description: 将ONNX模型转换为OpenVINO IR并压缩为FP16
  - command: benchmark_app -m model.xml -d CPU
    description: 在Intel CPU上基准测试模型性能
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - onnxruntime
  - optimum-cli
  risks:
  - level: low
    description: 推理操作无副作用
  references:
  - https://docs.openvino.ai/
- name: transformers-pipeline
  category: AI基础设施/大模型推理
  install_required: true
  install_method: pip install transformers
  description: HuggingFace Transformers Pipeline快速推理接口，一行代码完成文本生成/分类/问答
  usage:
  - python inference.py (使用transformers库)
  options:
  - flag: pipeline
    description: 创建推理管道(task, model, device)
  - flag: AutoModelForCausalLM
    description: 加载因果语言模型
  - flag: AutoTokenizer
    description: 加载分词器
  examples:
  - command: python -c "from transformers import pipeline; pipe = 
      pipeline('text-generation', model='gpt2'); 
      print(pipe('Hello')[0]['generated_text'])"
    description: 一行代码创建文本生成管道
  - command: python -c "from transformers import pipeline; pipe = 
      pipeline('sentiment-analysis'); print(pipe('I love this product!'))"
    description: 情感分析管道
  platforms:
  - linux
  - darwin
  - windows
  related_commands:
  - vllm
  - onnxruntime
  risks:
  - level: low
    description: 推理操作无副作用
  references:
  - https://huggingface.co/docs/transformers
