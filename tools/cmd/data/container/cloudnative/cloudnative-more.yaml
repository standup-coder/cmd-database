category: 容器编排/云原生扩展二
description: 容器运行时、本地开发、多集群、Secret 管理等云原生扩展命令
commands:
- name: containerd
  category: 容器编排/云原生扩展二
  install_required: true
  description: 容器运行时 daemon
  usage:
  - containerd [OPTIONS] [ARGS]
  options:
  - flag: --config
    description: 配置文件
  - flag: --log-level
    description: ''
  examples:
  - command: sudo containerd
    description: 启动 containerd
  - command: sudo containerd -c /etc/containerd/config.toml
    description: 指定配置启动
  platforms:
  - linux
  - darwin
  related_commands:
  - ctr
  - nerdctl
  install_method: 参考 
    https://github.com/containerd/containerd/blob/main/docs/getting-started.md
  risks:
  - level: medium
    description: containerd 是底层运行时，配置错误会导致容器无法启动
- name: ctr
  category: 容器编排/云原生扩展二
  install_required: true
  description: containerd 官方 CLI
  usage:
  - ctr [OPTIONS] [ARGS]
  options:
  - flag: images
    description: 镜像
  - flag: containers
    description: 容器
  - flag: run
    description: 运行
  - flag: pull
    description: 拉取
  examples:
  - command: ctr images ls
    description: 列出镜像
  - command: ctr run docker.io/library/nginx:latest nginx
    description: 运行容器
  platforms:
  - linux
  - darwin
  related_commands:
  - nerdctl
  - crictl
  install_method: 随 containerd 安装
  risks:
  - level: medium
    description: ctr 直接操作 containerd，可能影响 Kubernetes 容器
- name: crictl
  category: 容器编排/云原生扩展二
  install_required: true
  description: 兼容 CRI 的容器运行时 CLI
  usage:
  - crictl [OPTIONS] [ARGS]
  options:
  - flag: pods
    description: ''
  - flag: ps
    description: ''
  - flag: images
    description: ''
  - flag: logs
    description: ''
  - flag: exec
    description: ''
  examples:
  - command: crictl pods
    description: 列出 Pod
  - command: crictl logs <container-id>
    description: 查看容器日志
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - ctr
  install_method: 参考 
    https://github.com/kubernetes-sigs/cri-tools/blob/master/docs/crictl.md
  risks:
  - level: medium
    description: crictl 可直接删除运行中容器，生产环境请谨慎
- name: lxc
  category: 容器编排/云原生扩展二
  install_required: true
  description: Linux 容器（LXC）管理
  usage:
  - lxc [OPTIONS] [ARGS]
  options:
  - flag: launch
    description: 创建
  - flag: list
    description: 列出
  - flag: exec
    description: 执行
  - flag: stop
    description: 停止
  examples:
  - command: lxc launch ubuntu:22.04 mycontainer
    description: 创建容器
  - command: lxc exec mycontainer -- bash
    description: 进入容器
  platforms:
  - linux
  - darwin
  related_commands:
  - lxd
  - docker
  install_method: 包管理器安装，如 sudo apt install lxc
  risks:
  - level: medium
    description: 特权容器可能逃逸，请限制权限
- name: lxd
  category: 容器编排/云原生扩展二
  install_required: true
  description: LXC 系统容器管理守护进程
  usage:
  - lxd [OPTIONS] [ARGS]
  options:
  - flag: init
    description: 初始化
  - flag: list
    description: ''
  - flag: launch
    description: ''
  - flag: exec
    description: ''
  examples:
  - command: lxd init
    description: 初始化 LXD
  - command: lxc list
    description: 列出 LXD 容器
  platforms:
  - linux
  - darwin
  related_commands:
  - lxc
  - incus
  install_method: 参考 https://documentation.ubuntu.com/lxd/en/latest/installing/
  risks:
  - level: medium
    description: LXD 是系统级服务，请正确配置存储和网络
- name: incus
  category: 容器编排/云原生扩展二
  install_required: true
  description: LXD 社区分支（Canonical 替代方案）
  usage:
  - incus [OPTIONS] [ARGS]
  options:
  - flag: admin
    description: init
  - flag: list
    description: ''
  - flag: launch
    description: ''
  - flag: exec
    description: ''
  examples:
  - command: incus admin init
    description: 初始化 Incus
  - command: incus launch images:ubuntu/22.04 c1
    description: 创建容器
  platforms:
  - linux
  - darwin
  related_commands:
  - lxd
  - lxc
  install_method: 参考 https://linuxcontainers.org/incus/docs/main/installing/
  risks:
  - level: medium
    description: 同 LXD，需注意存储和网络配置
- name: firecracker
  category: 容器编排/云原生扩展二
  install_required: true
  description: AWS 开源微虚拟机（microVM）
  usage:
  - firecracker [OPTIONS] [ARGS]
  options:
  - flag: --api-sock
    description: ''
  - flag: --config-file
    description: ''
  - flag: --id
    description: ''
  examples:
  - command: firecracker --api-sock /tmp/firecracker.sock
    description: 启动 API 服务
  - command: curl --unix-socket /tmp/firecracker.sock -X PUT 
      http://localhost/mmds -d '{"latest":{}}'
    description: 配置 MMDS
  platforms:
  - linux
  - darwin
  related_commands:
  - kata-runtime
  - containerd
  install_method: 参考 https://github.com/firecracker-microvm/firecracker
  risks:
  - level: medium
    description: Firecracker 直接运行微虚拟机，需配置安全组和资源限制
- name: kata-runtime
  category: 容器编排/云原生扩展二
  install_required: true
  description: Kata Containers 运行时
  usage:
  - kata-runtime [OPTIONS] [ARGS]
  options:
  - flag: version
    description: ''
  - flag: check
    description: ''
  - flag: factory
    description: ''
  examples:
  - command: kata-runtime version
    description: 查看版本
  - command: kata-runtime check
    description: 检查系统兼容性
  platforms:
  - linux
  - darwin
  related_commands:
  - containerd
  - firecracker
  install_method: 参考 
    https://github.com/kata-containers/kata-containers/blob/main/docs/install/README.md
  risks:
  - level: medium
    description: Kata 使用 VM，需确认内核和虚拟化支持
- name: telepresence
  category: 容器编排/云原生扩展二
  install_required: true
  description: 本地开发连接远程 Kubernetes 服务
  usage:
  - telepresence [OPTIONS] [ARGS]
  options:
  - flag: connect
    description: 连接
  - flag: intercept
    description: 拦截
  - flag: list
    description: 列出
  - flag: quit
    description: 退出
  examples:
  - command: telepresence connect
    description: 连接集群
  - command: telepresence intercept myservice --port 8080:http
    description: 拦截服务到本地
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - devspace
  install_method: 参考 https://www.telepresence.io/docs/latest/install/
  risks:
  - level: high
    description: intercept 会将生产流量引到本地，请确认目标环境和回滚策略
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
