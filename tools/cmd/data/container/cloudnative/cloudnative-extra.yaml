category: 容器编排/云原生扩展
description: Service Mesh、Secret、本地集群、镜像构建等云原生扩展工具
commands:
- name: vault
  category: 容器编排/云原生扩展
  install_required: true
  description: HashiCorp Vault 密钥管理 CLI
  usage:
  - vault [OPTIONS] [ARGS]
  options:
  - flag: kv
    description: 管理键值对
  - flag: auth
    description: 管理认证
  - flag: policy
    description: 管理策略
  - flag: status
    description: ''
  examples:
  - command: vault status
    description: 查看 Vault 状态
  - command: vault kv get secret/myapp
    description: 读取密钥
  platforms:
  - linux
  - darwin
  related_commands:
  - consul
  - kubectl
  install_method: 参考 https://developer.hashicorp.com/vault/downloads
  risks:
  - level: critical
    description: Vault 管理敏感凭据，错误策略或 root token 泄露会造成严重安全事故
  - level: critical
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: consul
  category: 容器编排/云原生扩展
  install_required: true
  description: HashiCorp Consul 服务网格与发现
  usage:
  - consul [OPTIONS] [ARGS]
  options:
  - flag: agent
    description: 启动代理
  - flag: kv
    description: 管理键值
  - flag: catalog
    description: 查看服务
  - flag: connect
    description: ''
  examples:
  - command: consul agent -dev
    description: 开发模式启动 Consul
  - command: consul kv get -recurse config/
    description: 递归读取配置
  platforms:
  - linux
  - darwin
  related_commands:
  - vault
  - envoy
  install_method: 参考 https://developer.hashicorp.com/consul/downloads
  risks:
  - level: medium
    description: Consul 为控制平面，配置错误会影响服务发现
- name: nomad
  category: 容器编排/云原生扩展
  install_required: true
  description: HashiCorp Nomad 工作负载调度器
  usage:
  - nomad [OPTIONS] [ARGS]
  options:
  - flag: job
    description: run 运行作业
  - flag: status
    description: 查看状态
  - flag: alloc
    description: 管理分配
  examples:
  - command: nomad job run example.nomad
    description: 提交 Nomad 作业
  - command: nomad status
    description: 查看所有作业状态
  platforms:
  - linux
  - darwin
  related_commands:
  - consul
  - vault
  install_method: 参考 https://developer.hashicorp.com/nomad/downloads
  risks:
  - level: medium
    description: job stop 会停止工作负载，请确认影响范围
- name: envoy
  category: 容器编排/云原生扩展
  install_required: true
  description: 云原生高性能代理
  usage:
  - envoy [OPTIONS] [ARGS]
  options:
  - flag: -c
    description: 指定配置文件
  - flag: --mode
    description: ''
  - flag: --admin-address-path
    description: ''
  examples:
  - command: envoy -c envoy.yaml
    description: 启动 Envoy
  - command: envoy --mode validate -c envoy.yaml
    description: 验证配置
  platforms:
  - linux
  - darwin
  related_commands:
  - istioctl
  - consul
  install_method: 参考 https://www.envoyproxy.io/docs/envoy/latest/start/install
  risks:
  - level: medium
    description: Envoy 作为数据平面，配置错误会中断流量
- name: linkerd
  category: 容器编排/云原生扩展
  install_required: true
  description: 轻量级 Service Mesh CLI
  usage:
  - linkerd [OPTIONS] [ARGS]
  options:
  - flag: check
    description: 检查集群
  - flag: install
    description: 安装控制平面
  - flag: inject
    description: 自动注入 sidecar
  - flag: stat
    description: 查看统计
  examples:
  - command: linkerd check
    description: 检查 Linkerd 安装
  - command: linkerd inject deploy.yml | kubectl apply -f -
    description: 注入 sidecar 并部署
  platforms:
  - linux
  - darwin
  related_commands:
  - istioctl
  - kubectl
  install_method: 参考 https://linkerd.io/2/getting-started/
  risks:
  - level: medium
    description: 控制平面变更会影响流量治理，请在维护窗口执行
- name: jaeger-cli
  category: 容器编排/云原生扩展
  install_required: true
  description: Jaeger 分布式追踪 CLI
  usage:
  - jaeger-cli [OPTIONS] [ARGS]
  options:
  - flag: --query.query-port
    description: ''
  - flag: span
    description: 查询
  - flag: trace
    description: 查询
  examples:
  - command: jaeger-cli query --service myservice
    description: 查询服务追踪
  - command: jaeger-cli trace 123e4567
    description: 查看指定 trace
  platforms:
  - linux
  - darwin
  related_commands:
  - otelcol
  - tempo-cli
  install_method: 参考 https://www.jaegertracing.io/download/
  risks:
  - level: low
    description: 命令风险较低，执行前请阅读文档并确认参数。
- name: tempo-cli
  category: 容器编排/云原生扩展
  install_required: true
  description: Grafana Tempo 追踪查询 CLI
  usage:
  - tempo-cli [OPTIONS] [ARGS]
  options:
  - flag: --server
    description: 地址
  - flag: query
    description: 查询 trace
  examples:
  - command: tempo-cli query 123e4567
    description: 查询 trace ID
  - command: tempo-cli --server http://tempo:3200 search 'name=GET /api'
    description: 搜索 span
  platforms:
  - linux
  - darwin
  related_commands:
  - jaeger-cli
  - otelcol
  install_method: 参考 https://grafana.com/docs/tempo/latest/setup/
  risks:
  - level: low
    description: 命令风险较低，执行前请阅读文档并确认参数。
- name: loki-cli
  category: 容器编排/云原生扩展
  install_required: true
  description: Grafana Loki 日志查询 CLI（logcli）
  usage:
  - loki-cli [OPTIONS] [ARGS]
  options:
  - flag: --addr
    description: Loki 地址
  - flag: query
    description: 查询日志
  - flag: labels
    description: 列出标签
  examples:
  - command: logcli query '{job="varlogs"}'
    description: 查询 job 日志
  - command: logcli labels
    description: 列出所有标签
  platforms:
  - linux
  - darwin
  related_commands:
  - promtail
  - grafana-server
  install_method: 参考 
    https://grafana.com/docs/loki/latest/getting-started/logcli/
  risks:
  - level: low
    description: 只读/信息查询类命令，风险较低，但仍需确认目标对象。
- name: promtail
  category: 容器编排/云原生扩展
  install_required: true
  description: Loki 日志收集 Agent
  usage:
  - promtail [OPTIONS] [ARGS]
  options:
  - flag: -config.file
    description: 配置文件
  - flag: -dry-run
    description: ' dry-run 模式'
  - flag: -inspect
    description: ''
  examples:
  - command: promtail -config.file=promtail.yml
    description: 启动 Promtail
  - command: promtail -config.file=promtail.yml -dry-run
    description: dry-run 验证
  platforms:
  - linux
  - darwin
  related_commands:
  - loki-cli
  - fluent-bit
  install_method: 参考 
    https://grafana.com/docs/loki/latest/send-data/promtail/installation/
  risks:
  - level: medium
    description: 错误的标签配置会导致日志无法查询或 cardinality 爆炸
- name: cert-manager
  category: 容器编排/云原生扩展
  install_required: true
  description: Kubernetes 证书自动化管理（cmctl）
  usage:
  - cert-manager [OPTIONS] [ARGS]
  options:
  - flag: check
    description: 检查
  - flag: status
    description: 查看证书状态
  - flag: renew
    description: 手动续期
  examples:
  - command: cmctl check api
    description: 检查 cert-manager API
  - command: cmctl status certificate mycert -n default
    description: 查看证书状态
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - openssl
  install_method: 参考 https://cert-manager.io/docs/reference/cmctl/
  risks:
  - level: medium
    description: 手动 renew 或删除证书可能导致服务 TLS 中断
- name: external-dns
  category: 容器编排/云原生扩展
  install_required: true
  description: Kubernetes DNS 记录自动同步
  usage:
  - external-dns [OPTIONS] [ARGS]
  options:
  - flag: --provider
    description: 指定 DNS 服务商
  - flag: --source
    description: 指定来源
  - flag: --dry-run
    description: ''
  examples:
  - command: external-dns --provider aws --source ingress --dry-run
    description: dry-run 查看待同步记录
  - command: external-dns --provider aws --source service
    description: 同步 Service 到 DNS
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - aws
  install_method: 参考 https://kubernetes-sigs.github.io/external-dns/latest/
  risks:
  - level: high
    description: external-dns 会修改公共 DNS 记录，dry-run 验证后再执行
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: clusterctl
  category: 容器编排/云原生扩展
  install_required: true
  description: Cluster API 集群生命周期管理
  usage:
  - clusterctl [OPTIONS] [ARGS]
  options:
  - flag: init
    description: 初始化管理集群
  - flag: generate
    description: cluster 生成集群 YAML
  - flag: move
    description: 迁移集群
  examples:
  - command: clusterctl init --infrastructure aws
    description: 初始化 AWS provider
  - command: clusterctl generate cluster my-cluster --kubernetes-version v1.28.0
      > cluster.yaml
    description: 生成工作负载集群清单
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - kubeadm
  install_method: 参考 https://cluster-api.sigs.k8s.io/clusterctl/overview.html
  risks:
  - level: high
    description: clusterctl 管理 Kubernetes 集群生命周期，误操作可能影响管理平面
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: crossplane
  category: 容器编排/云原生扩展
  install_required: true
  description: Kubernetes 多云控制平面 CLI
  usage:
  - crossplane [OPTIONS] [ARGS]
  options:
  - flag: xpkg
    description: 管理包
  - flag: trace
    description: 追踪资源
  - flag: beta
    description: ''
  examples:
  - command: crossplane xpkg install provider crossplane/provider-aws
    description: 安装 AWS provider
  - command: crossplane trace resource mydb -n default
    description: 追踪资源状态
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - terraform
  install_method: 参考 https://docs.crossplane.io/latest/software/install/
  risks:
  - level: medium
    description: Managed Resources 会创建真实云资源，请确认 provider 配置
- name: k3s
  category: 容器编排/云原生扩展
  install_required: true
  description: 轻量级 Kubernetes 发行版
  usage:
  - k3s [OPTIONS] [ARGS]
  options:
  - flag: server
    description: 启动 server
  - flag: agent
    description: 启动 agent
  - flag: kubectl
    description: 子命令
  examples:
  - command: curl -sfL https://get.k3s.io | sh -
    description: 安装并启动 k3s
  - command: k3s kubectl get nodes
    description: 使用 k3s 内置 kubectl
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - kind
  install_method: 参考 https://docs.k3s.io/quick-start
  risks:
  - level: medium
    description: k3s 会修改系统配置并启动容器，请确认环境隔离
- name: k0s
  category: 容器编排/云原生扩展
  install_required: true
  description: 零依赖单二进制 Kubernetes 发行版
  usage:
  - k0s [OPTIONS] [ARGS]
  options:
  - flag: controller
    description: 启动控制节点
  - flag: worker
    description: 启动工作节点
  - flag: status
    description: ''
  examples:
  - command: k0s install controller --single
    description: 单节点安装
  - command: k0s status
    description: 查看集群状态
  platforms:
  - linux
  - darwin
  related_commands:
  - k3s
  - kubectl
  install_method: 参考 https://docs.k0sproject.io/stable/install/
  risks:
  - level: medium
    description: k0s 需要 root 权限并配置系统服务，请在测试环境验证
- name: microk8s
  category: 容器编排/云原生扩展
  install_required: true
  description: Ubuntu 官方轻量 Kubernetes 发行版
  usage:
  - microk8s [OPTIONS] [ARGS]
  options:
  - flag: status
    description: 查看状态
  - flag: enable
    description: 启用插件
  - flag: kubectl
    description: 子命令
  examples:
  - command: microk8s status
    description: 查看 MicroK8s 状态
  - command: microk8s enable dns ingress
    description: 启用 dns 和 ingress 插件
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - k3s
  install_method: sudo snap install microk8s --classic
  risks:
  - level: medium
    description: snap 安装会修改系统，生产环境请先评估
- name: oc
  category: 容器编排/云原生扩展
  install_required: true
  description: OpenShift 命令行工具
  usage:
  - oc [OPTIONS] [ARGS]
  options:
  - flag: login
    description: 登录
  - flag: new-project
    description: 创建项目
  - flag: adm
    description: 管理命令
  examples:
  - command: oc login https://api.example.com:6443
    description: 登录 OpenShift
  - command: oc new-project myproject
    description: 创建新项目
  platforms:
  - linux
  - darwin
  related_commands:
  - kubectl
  - helm
  install_method: 参考 
    https://docs.openshift.com/container-platform/latest/cli_reference/openshift_cli/getting-started-cli.html
  risks:
  - level: medium
    description: oc 拥有 cluster-admin 能力时请谨慎使用
- name: docker buildx
  category: 容器编排/云原生扩展
  install_required: true
  description: Docker 高级镜像构建插件
  usage:
  - docker buildx [OPTIONS] COMMAND
  options:
  - flag: build
    description: 构建
  - flag: create
    description: 创建 builder
  - flag: ls
    description: 列出 builder
  - flag: bake
    description: 批量构建
  examples:
  - command: docker buildx build --platform linux/amd64,linux/arm64 -t myapp .
    description: 多平台构建
  - command: docker buildx ls
    description: 列出 builders
  platforms:
  - linux
  - darwin
  related_commands:
  - docker build
  - buildkit
  install_method: Docker Desktop 自带或 docker-buildx 插件
  risks:
  - level: medium
    description: 多平台构建和缓存导出可能产生大量临时文件
- name: docker context
  category: 容器编排/云原生扩展
  install_required: false
  description: Docker 上下文管理
  usage:
  - docker context [OPTIONS] COMMAND
  options:
  - flag: create
    description: 创建上下文
  - flag: use
    description: 切换上下文
  - flag: ls
    description: 列出
  - flag: rm
    description: 删除
  examples:
  - command: docker context ls
    description: 列出上下文
  - command: docker context create remote --docker host=ssh://user@host
    description: 创建远程上下文
  platforms:
  - linux
  - darwin
  related_commands:
  - docker
  - kubectl config
  risks:
  - level: low
    description: Docker 信息查询类操作，风险较低。
- name: docker network
  category: 容器编排/云原生扩展
  install_required: false
  description: Docker 网络管理
  usage:
  - docker network [OPTIONS] COMMAND
  options:
  - flag: create
    description: 创建网络
  - flag: ls
    description: 列出
  - flag: inspect
    description: 查看
  - flag: rm
    description: 删除
  examples:
  - command: docker network create mynet
    description: 创建桥接网络
  - command: docker network connect mynet mycontainer
    description: 连接容器到网络
  platforms:
  - linux
  - darwin
  related_commands:
  - docker run
  - docker volume
  risks:
  - level: low
    description: Docker 信息查询类操作，风险较低。
- name: docker volume
  category: 容器编排/云原生扩展
  install_required: false
  description: Docker 卷管理
  usage:
  - docker volume [OPTIONS] COMMAND
  options:
  - flag: create
    description: 创建卷
  - flag: ls
    description: 列出
  - flag: inspect
    description: 查看
  - flag: rm
    description: 删除
  examples:
  - command: docker volume create myvol
    description: 创建命名卷
  - command: docker volume rm myvol
    description: 删除卷
  platforms:
  - linux
  - darwin
  related_commands:
  - docker run
  - docker network
  risks:
  - level: high
    description: 删除卷会丢失持久化数据，请确认无容器使用
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: docker system
  category: 容器编排/云原生扩展
  install_required: false
  description: Docker 系统级维护命令
  usage:
  - docker system [OPTIONS] COMMAND
  options:
  - flag: df
    description: 查看磁盘使用
  - flag: prune
    description: 清理未使用数据
  - flag: info
    description: 系统信息
  examples:
  - command: docker system df
    description: 查看 Docker 磁盘使用
  - command: docker system prune -a
    description: 清理所有未使用镜像和卷（谨慎）
  platforms:
  - linux
  - darwin
  related_commands:
  - docker
  - docker volume
  risks:
  - level: high
    description: prune 会删除未使用的镜像、容器、网络和卷，请确认后再执行
  - level: high
    description: 操作前请仔细阅读文档并确认参数，建议在测试环境或非生产数据上先行验证。
- name: buildkit
  category: 容器编排/云原生扩展
  install_required: true
  description: Docker/Moby 下一代镜像构建工具包
  usage:
  - buildkit [OPTIONS] [ARGS]
  options:
  - flag: buildctl
    description: 命令行
  - flag: --addr
    description: 指定 buildkitd 地址
  examples:
  - command: buildctl build --frontend dockerfile.v0 --local context=. --local 
      dockerfile=.
    description: 使用 Dockerfile 构建
  - command: buildctl du
    description: 查看磁盘使用
  platforms:
  - linux
  - darwin
  related_commands:
  - docker buildx
  - kaniko
  install_method: 参考 https://github.com/moby/buildkit/blob/master/README.md
  risks:
  - level: medium
    description: 构建会执行 Dockerfile 中的指令，请审查基础镜像和命令
- name: kaniko
  category: 容器编排/云原生扩展
  install_required: true
  description: 无需特权 Docker daemon 的镜像构建工具
  usage:
  - kaniko [OPTIONS] [ARGS]
  options:
  - flag: --dockerfile
    description: Dockerfile
  - flag: --context
    description: ''
  - flag: --destination
    description: ''
  - flag: --no-push
    description: ''
  examples:
  - command: executor --dockerfile Dockerfile --context . --destination 
      registry/myapp:v1
    description: 构建并推送镜像
  - command: executor --dockerfile Dockerfile --context . --no-push
    description: 只构建不推送
  platforms:
  - linux
  - darwin
  related_commands:
  - docker build
  - buildkit
  install_method: 参考 https://github.com/GoogleContainerTools/kaniko
  risks:
  - level: medium
    description: kaniko 会访问 registry 凭据，请确保 Secret 安全
- name: img
  category: 容器编排/云原生扩展
  install_required: true
  description: 由 buildkit 支持的无 daemon 镜像构建工具
  usage:
  - img [OPTIONS] [ARGS]
  options:
  - flag: build
    description: 构建
  - flag: tag
    description: 标签
  - flag: push
    description: 推送
  - flag: pull
    description: 拉取
  examples:
  - command: img build -t myapp .
    description: 构建镜像
  - command: img tag myapp registry/myapp:v1
    description: 打标签
  platforms:
  - linux
  - darwin
  related_commands:
  - buildkit
  - docker
  install_method: 参考 https://github.com/genuinetools/img
  risks:
  - level: medium
    description: img 以非 root 运行但仍在用户命名空间，注意缓存目录权限
- name: infracost
  category: 容器编排/云原生扩展
  install_required: true
  description: 云基础设施成本估算工具
  usage:
  - infracost [OPTIONS] [ARGS]
  options:
  - flag: breakdown
    description: 生成成本明细
  - flag: diff
    description: 比较成本差异
