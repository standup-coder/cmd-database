category: Shell脚本/终端复用
description: 终端复用和会话管理工具
commands:
- name: tmux split-window
  category: Shell脚本/终端复用
  install_required: true
  install_method: 同 tmux
  description: tmux 窗口分割和面板管理（前缀键 Ctrl+b）
  usage:
  - Ctrl+b % (垂直分割)
  - Ctrl+b " (水平分割)
  options:
  - flag: Ctrl+b %
    description: 垂直分割当前窗格
  - flag: Ctrl+b "
    description: 水平分割当前窗格
  - flag: Ctrl+b 方向键
    description: 在窗格间切换
  - flag: Ctrl+b x
    description: 关闭当前窗格
  - flag: Ctrl+b z
    description: 最大化/还原当前窗格
  examples:
  - command: Ctrl+b %
    description: 垂直分割，左右两个终端
  - command: Ctrl+b "
    description: 水平分割，上下两个终端
  - command: Ctrl+b z
    description: 临时最大化当前窗格（再按还原）
  - command: Ctrl+b {
    description: 将当前窗格左移
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 关闭窗格会终止其中运行的进程
  related_commands:
  - tmux
  - tmux new-window
- name: tmux new-window
  category: Shell脚本/终端复用
  install_required: true
  install_method: 同 tmux
  description: tmux 窗口和标签页管理
  usage:
  - Ctrl+b c (新建窗口)
  - Ctrl+b n/p (切换窗口)
  options:
  - flag: Ctrl+b c
    description: 创建新窗口
  - flag: Ctrl+b n
    description: 切换到下一个窗口
  - flag: Ctrl+b p
    description: 切换到上一个窗口
  - flag: Ctrl+b 数字
    description: 切换到指定编号窗口
  - flag: Ctrl+b ,
    description: 重命名当前窗口
  - flag: Ctrl+b &
    description: 关闭当前窗口
  examples:
  - command: Ctrl+b c
    description: 新建一个窗口标签
  - command: Ctrl+b 2
    description: 跳转到 2 号窗口
  - command: Ctrl+b ,
    description: 重命名窗口为有意义的名称
  - command: tmux rename-window -t dev "build"
    description: 命令行方式重命名窗口
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 关闭窗口终止其中所有进程
  related_commands:
  - tmux
  - tmux split-window
- name: screen
  category: Shell脚本/终端复用
  install_required: true
  install_method: apt install screen (Ubuntu) 或 brew install screen (macOS)
  description: 经典终端复用器，支持会话保持和恢复
  usage:
  - screen [选项] [会话名]
  options:
  - flag: -S
    description: 创建命名会话
  - flag: -r
    description: 恢复分离的会话
  - flag: -ls
    description: 列出所有会话
  - flag: -d
    description: 先分离再恢复
  - flag: -x
    description: 多终端共享会话
  examples:
  - command: screen -S build
    description: 创建名为 build 的会话
  - command: screen -r build
    description: 恢复 build 会话
  - command: screen -ls
    description: 列出所有会话
  - command: screen -d -r build
    description: 强制分离并恢复（会话被其他终端占用时）
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: kill 会话终止其中进程
  related_commands:
  - tmux
- name: tmux send-keys
  category: Shell脚本/终端复用
  install_required: true
  install_method: 同 tmux
  description: 向 tmux 窗格发送命令（脚本化自动操作）
  usage:
  - tmux send-keys -t [目标] [命令] [按键]
  options:
  - flag: -t
    description: 目标窗格 (session:window.pane)
  - flag: C-m
    description: 发送回车（执行命令）
  - flag: -l
    description: 字面发送（不解析特殊键）
  examples:
  - command: tmux send-keys -t dev:0.1 "npm run dev" C-m
    description: 在 dev 会话 0 号窗口右侧面板启动开发服务器
  - command: tmux send-keys -t dev:0.0 "go run ." C-m
    description: 在左侧面板启动 Go 服务
  - command: tmux new-session -d -s ci && tmux send-keys -t ci "make test" C-m
    description: 后台创建会话并执行测试
  platforms:
  - linux
  - darwin
  risks:
  - level: medium
    description: 自动发送命令可能在错误窗格执行危险操作
  related_commands:
  - tmux
  - tmux split-window
- name: byobu
  category: Shell脚本/终端复用
  install_required: true
  install_method: brew install byobu (macOS) 或 apt install byobu (Ubuntu)
  description: tmux/screen 增强前端，提供状态栏和快捷键
  usage:
  - byobu [选项]
  options:
  - flag: -S
    description: 指定后端 (tmux/screen)
  - flag: enable
    description: 登录时自动启动
  - flag: disable
    description: 取消自动启动
  examples:
  - command: byobu
    description: 启动 byobu 会话
  - command: byobu enable
    description: SSH 登录时自动启动 byobu
  - command: byobu-config
    description: 打开配置界面
  - command: byobu-status
    description: 查看状态栏信息
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 基于 tmux/screen，风险同底层工具
  related_commands:
  - tmux
  - screen
