category: Shell脚本/文本处理
description: JSON/YAML 处理和文本转换工具
commands:
- name: jq
  category: Shell脚本/文本处理
  install_required: true
  install_method: brew install jq (macOS) 或 apt install jq (Ubuntu)
  description: 轻量级命令行 JSON 处理器
  usage:
  - jq [选项] [过滤器] [文件]
  - 命令 | jq [过滤器]
  options:
  - flag: -r
    description: 原始输出（不带引号）
  - flag: -c
    description: 紧凑输出（单行）
  - flag: -e
    description: 根据输出设置退出码
  - flag: --arg
    description: 传入变量 (--arg name value)
  - flag: -s
    description: 将所有输入收集为数组
  examples:
  - command: cat data.json | jq '.name'
    description: 提取 JSON 字段
  - command: curl -s api.example.com/users | jq '.[] | {id, name, email}'
    description: 数组遍历并选择字段
  - command: jq -r '.items[].url' response.json
    description: 原始输出所有 URL
  - command: jq --arg env prod '.config | select(.env == $env)' config.json
    description: 使用变量过滤
  platforms:
  - linux
  - darwin
  - windows
  risks:
  - level: low
    description: 只读/信息查询类命令，风险较低，但仍需确认目标对象。
  related_commands:
  - yq
  - sed
- name: yq
  category: Shell脚本/文本处理
  install_required: true
  install_method: brew install yq (macOS) 或 go install github.com/mikefarah/yq/v4@latest
  description: 命令行 YAML/XML/JSON 处理器（jq 的 YAML 版本）
  usage:
  - yq [表达式] [文件]
  - yq eval [表达式] [文件]
  options:
  - flag: -i
    description: 原地修改文件
  - flag: -o
    description: 输出格式 (yaml/json/xml/props)
  - flag: -r
    description: 原始字符串输出
  - flag: -e
    description: 根据结果设置退出码
  examples:
  - command: yq '.metadata.name' deployment.yaml
    description: 提取 YAML 字段
  - command: yq -i '.spec.replicas = 3' deployment.yaml
    description: 原地修改副本数
  - command: yq -o=json '.' config.yaml
    description: YAML 转 JSON
  - command: yq eval-all 'select(.kind == "Service")' all.yaml
    description: 过滤指定 kind 的文档
  platforms:
  - linux
  - darwin
  - windows
  risks:
  - level: medium
    description: -i 原地修改文件，建议先备份
  related_commands:
  - jq
  - kubectl
- name: sed
  category: Shell脚本/文本处理
  install_required: false
  description: 流编辑器，逐行处理文本（查找替换、删除、插入）
  usage:
  - sed [选项] '脚本' [文件]
  - 命令 | sed '脚本'
  options:
  - flag: -i
    description: 原地修改文件（macOS 需 -i ''）
  - flag: -n
    description: 静默模式（仅输出 p 命令的行）
  - flag: -e
    description: 多个编辑脚本
  - flag: -r / -E
    description: 使用扩展正则表达式
  examples:
  - command: sed 's/old/new/g' file.txt
    description: 全局替换 old 为 new（输出到 stdout）
  - command: sed -i 's/old/new/g' file.txt
    description: 原地全局替换（Linux）
  - command: sed -i '' 's/old/new/g' file.txt
    description: 原地全局替换（macOS）
  - command: sed -n '10,20p' file.txt
    description: 仅输出第 10-20 行
  platforms:
  - linux
  - darwin
  risks:
  - level: medium
    description: -i 原地修改不可逆，正则错误可能破坏文件内容
  related_commands:
  - awk
  - grep
- name: awk
  category: Shell脚本/文本处理
  install_required: false
  description: 模式扫描和处理语言，按列处理结构化文本
  usage:
  - awk [选项] '程序' [文件]
  - 命令 | awk '程序'
  options:
  - flag: -F
    description: 指定字段分隔符
  - flag: -v
    description: 传入变量 (-v var=value)
  - flag: -f
    description: 从文件读取 awk 程序
  examples:
  - command: awk '{print $1, $3}' file.txt
    description: 输出第 1 和第 3 列
  - command: awk -F: '{print $1}' /etc/passwd
    description: 以冒号分隔提取用户名
  - command: awk '{sum += $1} END {print sum}' numbers.txt
    description: 求第一列的和
  - command: df -h | awk 'NR>1 {print $5, $6}'
    description: 提取磁盘使用率和挂载点
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 只读/信息查询类命令，风险较低，但仍需确认目标对象。
  related_commands:
  - sed
  - cut
- name: xargs
  category: Shell脚本/文本处理
  install_required: false
  description: 将标准输入转换为命令参数，批量执行命令
  usage:
  - 命令 | xargs [选项] [命令]
  options:
  - flag: -n
    description: 每次传递的参数数量
  - flag: -P
    description: 并行执行数量
  - flag: -I
    description: 替换占位符 (-I {})
  - flag: -0
    description: 以 null 分隔输入（配合 find -print0）
  - flag: -p
    description: 执行前确认
  examples:
  - command: find . -name "*.log" | xargs rm -f
    description: 批量删除所有 .log 文件
  - command: find . -name "*.go" -print0 | xargs -0 gofmt -w
    description: 批量格式化 Go 文件（安全处理空格文件名）
  - command: cat urls.txt | xargs -P 4 -n 1 curl -O
    description: 4 路并行下载 URL 列表
  - command: echo {1..10} | xargs -n 2 echo
    description: 每 2 个参数一组执行
  platforms:
  - linux
  - darwin
  risks:
  - level: high
    description: 批量执行删除/修改操作，输入错误可能影响大量文件
  related_commands:
  - find
  - parallel
- name: parallel
  category: Shell脚本/文本处理
  install_required: true
  install_method: brew install parallel (macOS) 或 apt install parallel (Ubuntu)
  description: GNU Parallel 并行命令执行工具
  usage:
  - parallel [选项] [命令] ::: [参数]
  - 命令 | parallel [选项]
  options:
  - flag: -j
    description: 并行任务数（默认 CPU 核数）
  - flag: --bar
    description: 显示进度条
  - flag: --dry-run
    description: 仅打印将执行的命令
  - flag: -X
    description: 多参数模式
  examples:
  - command: parallel -j 4 convert {} {.}.png ::: *.jpg
    description: 4 路并行转换 JPG 为 PNG
  - command: cat servers.txt | parallel -j 10 ssh {} uptime
    description: 10 路并行检查服务器状态
  - command: parallel --bar gzip ::: *.log
    description: 带进度条并行压缩日志
  - command: parallel --dry-run echo {} ::: a b c
    description: 预览将执行的命令
  platforms:
  - linux
  - darwin
  risks:
  - level: high
    description: 并行执行放大操作影响，--dry-run 先预览
  related_commands:
  - xargs
  - find
- name: cut
  category: Shell脚本/文本处理
  install_required: false
  description: 按列切割文本行
  usage:
  - cut [选项] [文件]
  options:
  - flag: -d
    description: 指定分隔符
  - flag: -f
    description: 选择字段（列号）
  - flag: -c
    description: 选择字符位置
  examples:
  - command: cut -d: -f1 /etc/passwd
    description: 提取用户名（第一列）
  - command: cut -d' ' -f1,3 data.txt
    description: 提取第 1 和第 3 列
  - command: cut -c1-10 file.txt
    description: 提取每行前 10 个字符
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 只读操作，无风险
  related_commands:
  - awk
  - sed
- name: sort
  category: Shell脚本/文本处理
  install_required: false
  description: 文本排序工具
  usage:
  - sort [选项] [文件]
  options:
  - flag: -n
    description: 数值排序
  - flag: -r
    description: 逆序
  - flag: -u
    description: 去重
  - flag: -k
    description: 按指定列排序
  - flag: -t
    description: 指定分隔符
  - flag: -h
    description: 人类可读大小排序 (1K/2M/3G)
  examples:
  - command: sort -n numbers.txt
    description: 数值排序
  - command: sort -t: -k3 -n /etc/passwd
    description: 按 UID（第 3 列）数值排序
  - command: du -sh * | sort -hr
    description: 按文件大小降序排列
  - command: sort -u file.txt
    description: 排序并去重
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 只读操作，无风险
  related_commands:
  - uniq
  - awk
- name: uniq
  category: Shell脚本/文本处理
  install_required: false
  description: 报告或过滤重复行（需先排序）
  usage:
  - uniq [选项] [文件]
  - sort file | uniq [选项]
  options:
  - flag: -c
    description: 显示每行出现次数
  - flag: -d
    description: 仅输出重复行
  - flag: -u
    description: 仅输出唯一行
  - flag: -i
    description: 忽略大小写
  examples:
  - command: sort access.log | uniq -c | sort -rn | head
    description: 统计访问频率 Top 10
  - command: sort file.txt | uniq -d
    description: 找出重复行
  - command: sort file.txt | uniq -u
    description: 找出唯一行
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 只读操作，无风险
  related_commands:
  - sort
  - awk
- name: diff
  category: Shell脚本/文本处理
  install_required: false
  description: 逐行比较文件差异
  usage:
  - diff [选项] 文件1 文件2
  options:
  - flag: -u
    description: 统一格式（unified diff）
  - flag: -r
    description: 递归比较目录
  - flag: -w
    description: 忽略空白差异
  - flag: -y
    description: 并排显示
  - flag: --color
    description: 彩色输出
  examples:
  - command: diff -u old.conf new.conf
    description: 统一格式比较配置变更
  - command: diff -r src/ src-backup/
    description: 递归比较两个目录
  - command: diff -y --color file1 file2
    description: 并排彩色对比
  - command: diff <(sort file1) <(sort file2)
    description: 比较排序后的内容差异
  platforms:
  - linux
  - darwin
  risks:
  - level: low
    description: 只读操作，无风险
  related_commands:
  - git diff
  - colordiff
